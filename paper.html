<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Trading · Kite MCP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg-0: #0a0c10; --bg-1: #0f1218; --bg-2: #161b24; --bg-3: #1e2430;
  --border: #252d3a; --border-hi: #334155;
  --text-0: #e2e8f0; --text-1: #94a3b8; --text-2: #64748b;
  --accent: #22d3ee; --accent-dim: rgba(34,211,238,0.12);
  --green: #34d399; --green-dim: rgba(52,211,153,0.12);
  --red: #f87171; --red-dim: rgba(248,113,113,0.1);
  --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.1);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: var(--bg-1); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); }
.topbar-title { font-size: 14px; font-weight: 500; color: var(--text-1); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-updated { font-family: var(--mono); font-size: 11px; color: var(--text-2); }

.content { padding: 20px 24px; max-width: 1200px; }

.dash-nav { display: flex; gap: 0; padding: 0 24px; background: var(--bg-1); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
.dash-nav-link { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text-2); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: var(--sans); }
.dash-nav-link:hover { color: var(--text-1); }
.dash-nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

.paper-banner { background: var(--purple-dim); border: 1px solid var(--purple); border-radius: 6px; padding: 14px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.paper-banner-left { display: flex; align-items: center; gap: 10px; }
.paper-badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.paper-badge-on { background: var(--green-dim); color: var(--green); }
.paper-badge-off { background: var(--red-dim); color: var(--red); }
.paper-banner-info { font-size: 13px; color: var(--text-1); }
.paper-banner-info span { font-family: var(--mono); font-weight: 500; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 6px; }
.stat-value { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text-0); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }

.section-header { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

.tbl-wrap { overflow-x: auto; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg-2); position: sticky; top: 0; }
th.right, td.right { text-align: right; }
td { padding: 7px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--text-1); white-space: nowrap; }
tr:hover td { background: var(--bg-2); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-family: var(--mono); font-size: 11px; font-weight: 500; }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }

.empty-state { text-align: center; padding: 32px 20px; color: var(--text-2); font-size: 13px; }
.loading-state { text-align: center; padding: 32px 20px; color: var(--text-2); font-size: 13px; font-family: var(--mono); }

.reset-btn { padding: 8px 20px; border-radius: 4px; border: 1px solid var(--red); background: var(--red-dim); color: var(--red); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: all 0.12s; }
.reset-btn:hover { background: rgba(248,113,113,0.2); }
.reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }

@media (max-width: 640px) {
  .content { padding: 14px 12px; }
  .topbar { padding: 0 12px; }
  .stats-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .stat-value { font-size: 18px; }
  .paper-banner { flex-direction: column; align-items: flex-start; }
  .dash-nav-link { padding: 12px 14px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Kite MCP</span>
    <span class="topbar-sep"></span>
    <span class="topbar-title">Paper Trading</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-updated" id="lastUpdated">--</span>
  </div>
</div>

<nav class="dash-nav">
  <a href="/dashboard" class="dash-nav-link">Portfolio</a>
  <a href="/dashboard/activity" class="dash-nav-link">Activity</a>
  <a href="/dashboard/orders" class="dash-nav-link">Orders</a>
  <a href="/dashboard/alerts" class="dash-nav-link">Alerts</a>
  <a href="/dashboard/paper" class="dash-nav-link active">Paper</a>
  <a href="/dashboard/safety" class="dash-nav-link">Safety</a>
  <a href="/admin/ops" class="dash-nav-link">Ops</a>
</nav>

<div class="content">
  <div id="paperBanner" class="paper-banner" style="display:none"></div>
  <div class="stats-grid" id="statsGrid"></div>
  <div id="holdingsSection"></div>
  <div id="positionsSection"></div>
  <div id="ordersSection"></div>
  <div id="resetSection" style="margin-top:24px;display:none">
    <button class="reset-btn" id="resetBtn">Reset Paper Account</button>
  </div>
  <div id="loadingState" class="loading-state">Loading paper trading data...</div>
  <div id="disabledState" class="empty-state" style="display:none">
    Paper trading is not enabled. Use the <code>paper_trading_toggle</code> tool to enable it.
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Safe DOM helpers ---
  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = String(text);
    return e;
  }
  function tdEl(text, cls) {
    var c = document.createElement('td');
    if (cls) c.className = cls;
    if (text != null) c.textContent = String(text);
    return c;
  }
  function clearChildren(node) { while (node.firstChild) node.removeChild(node.firstChild); }

  function fmtINR(n) {
    if (n == null || isNaN(n)) return '--';
    var neg = n < 0;
    var abs = Math.abs(n);
    var parts = abs.toFixed(2).split('.');
    var intPart = parts[0];
    var decPart = parts[1];
    if (intPart.length > 3) {
      var last3 = intPart.slice(-3);
      var rest = intPart.slice(0, -3);
      var groups = [];
      while (rest.length > 2) { groups.unshift(rest.slice(-2)); rest = rest.slice(0, -2); }
      if (rest.length > 0) groups.unshift(rest);
      intPart = groups.join(',') + ',' + last3;
    }
    return (neg ? '-' : '') + '\u20B9' + intPart + '.' + decPart;
  }

  function pnlCls(n) { return n > 0 ? 'green' : n < 0 ? 'red' : ''; }

  function fmtTime(iso) {
    if (!iso) return '--';
    var d = new Date(iso);
    return d.toLocaleTimeString('en-GB', {hour12: false}) + ' ' + d.toLocaleDateString('en-GB', {day: '2-digit', month: 'short'});
  }

  var refreshTimer = null;

  // --- Fetch all data ---
  function fetchAll() {
    Promise.all([
      fetch('/dashboard/api/paper/status').then(function(r) { return r.json(); }),
      fetch('/dashboard/api/paper/holdings').then(function(r) { return r.json(); }),
      fetch('/dashboard/api/paper/positions').then(function(r) { return r.json(); }),
      fetch('/dashboard/api/paper/orders').then(function(r) { return r.json(); })
    ]).then(function(results) {
      var status = results[0];
      var holdings = results[1];
      var positions = results[2];
      var orders = results[3];
      render(status, holdings, positions, orders);
    }).catch(function(err) {
      document.getElementById('loadingState').textContent = 'Failed to load: ' + err.message;
    });
  }

  function render(status, holdingsData, positionsData, ordersData) {
    document.getElementById('loadingState').style.display = 'none';

    if (!status.enabled) {
      document.getElementById('disabledState').style.display = '';
      document.getElementById('paperBanner').style.display = 'none';
      document.getElementById('resetSection').style.display = 'none';
      clearChildren(document.getElementById('statsGrid'));
      clearChildren(document.getElementById('holdingsSection'));
      clearChildren(document.getElementById('positionsSection'));
      clearChildren(document.getElementById('ordersSection'));
      return;
    }

    document.getElementById('disabledState').style.display = 'none';

    // Banner
    var banner = document.getElementById('paperBanner');
    clearChildren(banner);
    banner.style.display = '';
    var bannerLeft = el('div', 'paper-banner-left');
    bannerLeft.appendChild(el('span', 'paper-badge paper-badge-on', 'PAPER ON'));
    var info = el('span', 'paper-banner-info');
    info.appendChild(document.createTextNode('Initial: '));
    info.appendChild(el('span', '', fmtINR(status.initial_cash)));
    info.appendChild(document.createTextNode(' | Created: '));
    info.appendChild(el('span', '', fmtTime(status.created_at)));
    bannerLeft.appendChild(info);
    banner.appendChild(bannerLeft);

    // Stats cards
    var holdingsArr = Array.isArray(holdingsData) ? holdingsData : [];
    var posObj = positionsData || {};
    var posArr = Array.isArray(posObj.net) ? posObj.net : (Array.isArray(posObj.day) ? posObj.day : []);

    var totalHoldingsVal = 0;
    var unrealizedPnl = 0;
    for (var i = 0; i < holdingsArr.length; i++) {
      var h = holdingsArr[i];
      totalHoldingsVal += (h.last_price || h.average_price || 0) * (h.quantity || 0);
      unrealizedPnl += (h.pnl || 0);
    }
    for (var j = 0; j < posArr.length; j++) {
      unrealizedPnl += (posArr[j].pnl || 0);
    }
    var portfolioVal = (status.cash_balance || 0) + totalHoldingsVal;

    var grid = document.getElementById('statsGrid');
    clearChildren(grid);
    var cards = [
      {label: 'Portfolio Value', value: fmtINR(portfolioVal), cls: ''},
      {label: 'Unrealized P&L', value: fmtINR(unrealizedPnl), cls: pnlCls(unrealizedPnl)},
      {label: 'Cash Balance', value: fmtINR(status.cash_balance), cls: ''},
      {label: 'Positions', value: String(status.positions || 0), cls: ''}
    ];
    for (var c = 0; c < cards.length; c++) {
      var card = el('div', 'stat-card');
      card.appendChild(el('div', 'stat-label', cards[c].label));
      card.appendChild(el('div', 'stat-value ' + cards[c].cls, cards[c].value));
      grid.appendChild(card);
    }

    // Holdings table
    renderHoldings(holdingsArr);
    renderPositions(posArr);
    renderOrders(ordersData);

    // Reset section
    document.getElementById('resetSection').style.display = '';

    // Update timestamp
    var now = new Date();
    document.getElementById('lastUpdated').textContent =
      now.toLocaleTimeString('en-GB', {hour12: false}) + ' ' + now.toLocaleDateString('en-GB', {day: '2-digit', month: 'short'});
  }

  function renderHoldings(holdings) {
    var section = document.getElementById('holdingsSection');
    clearChildren(section);
    section.appendChild(el('div', 'section-header', 'Holdings'));

    if (!holdings || holdings.length === 0) {
      section.appendChild(el('div', 'empty-state', 'No paper holdings'));
      return;
    }
    var wrap = el('div', 'tbl-wrap');
    var table = document.createElement('table');
    var thead = document.createElement('thead');
    var hr = document.createElement('tr');
    var cols = ['Symbol', 'Exchange', 'Qty', 'Avg Price', 'LTP', 'P&L'];
    var rightCols = {2:true, 3:true, 4:true, 5:true};
    for (var i = 0; i < cols.length; i++) {
      var th = document.createElement('th');
      th.textContent = cols[i];
      if (rightCols[i]) th.className = 'right';
      hr.appendChild(th);
    }
    thead.appendChild(hr);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    for (var j = 0; j < holdings.length; j++) {
      var h = holdings[j];
      var pnl = h.pnl || 0;
      var tr = document.createElement('tr');
      var symTd = tdEl(h.tradingsymbol);
      symTd.style.fontWeight = '600';
      symTd.style.color = 'var(--text-0)';
      var badgeEl = el('span', 'badge badge-purple', 'PAPER');
      badgeEl.style.marginLeft = '6px';
      badgeEl.style.fontSize = '9px';
      symTd.appendChild(badgeEl);
      tr.appendChild(symTd);
      tr.appendChild(tdEl(h.exchange));
      tr.appendChild(tdEl(h.quantity, 'right'));
      tr.appendChild(tdEl(fmtINR(h.average_price), 'right'));
      tr.appendChild(tdEl(fmtINR(h.last_price), 'right'));
      var pnlTd = tdEl(fmtINR(pnl), 'right');
      if (pnl > 0) pnlTd.style.color = 'var(--green)';
      else if (pnl < 0) pnlTd.style.color = 'var(--red)';
      tr.appendChild(pnlTd);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    section.appendChild(wrap);
  }

  function renderPositions(positions) {
    var section = document.getElementById('positionsSection');
    clearChildren(section);
    section.appendChild(el('div', 'section-header', 'Positions'));

    if (!positions || positions.length === 0) {
      section.appendChild(el('div', 'empty-state', 'No open paper positions'));
      return;
    }
    var wrap = el('div', 'tbl-wrap');
    var table = document.createElement('table');
    var thead = document.createElement('thead');
    var hr = document.createElement('tr');
    var cols = ['Symbol', 'Product', 'Qty', 'Avg Price', 'LTP', 'P&L'];
    var rightCols = {2:true, 3:true, 4:true, 5:true};
    for (var i = 0; i < cols.length; i++) {
      var th = document.createElement('th');
      th.textContent = cols[i];
      if (rightCols[i]) th.className = 'right';
      hr.appendChild(th);
    }
    thead.appendChild(hr);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    for (var j = 0; j < positions.length; j++) {
      var p = positions[j];
      var pnl = p.pnl || 0;
      var tr = document.createElement('tr');
      var symTd = tdEl(p.tradingsymbol);
      symTd.style.fontWeight = '600';
      symTd.style.color = 'var(--text-0)';
      tr.appendChild(symTd);
      var prodTd = document.createElement('td');
      prodTd.appendChild(el('span', 'badge badge-amber', p.product || '--'));
      tr.appendChild(prodTd);
      tr.appendChild(tdEl(p.quantity, 'right'));
      tr.appendChild(tdEl(fmtINR(p.average_price), 'right'));
      tr.appendChild(tdEl(fmtINR(p.last_price), 'right'));
      var pnlTd = tdEl(fmtINR(pnl), 'right');
      if (pnl > 0) pnlTd.style.color = 'var(--green)';
      else if (pnl < 0) pnlTd.style.color = 'var(--red)';
      tr.appendChild(pnlTd);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    section.appendChild(wrap);
  }

  function renderOrders(ordersData) {
    var section = document.getElementById('ordersSection');
    clearChildren(section);
    section.appendChild(el('div', 'section-header', 'Orders'));

    var orders = Array.isArray(ordersData) ? ordersData : [];
    if (orders.length === 0) {
      section.appendChild(el('div', 'empty-state', 'No paper orders'));
      return;
    }
    var wrap = el('div', 'tbl-wrap');
    var table = document.createElement('table');
    var thead = document.createElement('thead');
    var hr = document.createElement('tr');
    var cols = ['Order ID', 'Symbol', 'Side', 'Type', 'Qty', 'Price', 'Status', 'Time'];
    var rightCols = {4:true, 5:true};
    for (var i = 0; i < cols.length; i++) {
      var th = document.createElement('th');
      th.textContent = cols[i];
      if (rightCols[i]) th.className = 'right';
      hr.appendChild(th);
    }
    thead.appendChild(hr);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    for (var j = 0; j < orders.length; j++) {
      var o = orders[j];
      var tr = document.createElement('tr');
      var idTd = tdEl((o.order_id || '').replace('PAPER_', 'P'));
      idTd.style.fontSize = '10px';
      tr.appendChild(idTd);
      var symTd = tdEl(o.tradingsymbol || '--');
      symTd.style.fontWeight = '600';
      symTd.style.color = 'var(--text-0)';
      tr.appendChild(symTd);
      var sideTd = document.createElement('td');
      var sideClass = o.transaction_type === 'BUY' ? 'badge-green' : 'badge-red';
      sideTd.appendChild(el('span', 'badge ' + sideClass, o.transaction_type || '--'));
      tr.appendChild(sideTd);
      tr.appendChild(tdEl(o.order_type || '--'));
      tr.appendChild(tdEl(o.quantity, 'right'));
      var priceVal = o.status === 'COMPLETE' ? o.average_price : o.price;
      tr.appendChild(tdEl(fmtINR(priceVal), 'right'));
      var statusTd = document.createElement('td');
      var stClass = 'badge-amber';
      if (o.status === 'COMPLETE') stClass = 'badge-green';
      else if (o.status === 'REJECTED' || o.status === 'CANCELLED') stClass = 'badge-red';
      statusTd.appendChild(el('span', 'badge ' + stClass, o.status || '--'));
      tr.appendChild(statusTd);
      tr.appendChild(tdEl(fmtTime(o.placed_at)));
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    section.appendChild(wrap);
  }

  // Reset handler
  document.getElementById('resetBtn').addEventListener('click', function() {
    if (!confirm('Reset paper trading account? This clears all orders, positions, and holdings. Cash will be restored to the initial amount.')) return;
    var btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';
    fetch('/dashboard/api/paper/reset', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function() {
        btn.disabled = false;
        btn.textContent = 'Reset Paper Account';
        fetchAll();
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Reset Paper Account';
        alert('Reset failed: ' + err.message);
      });
  });

  // Init + auto-refresh
  fetchAll();
  refreshTimer = setInterval(fetchAll, 10000);
})();
</script>
</body>
</html>
