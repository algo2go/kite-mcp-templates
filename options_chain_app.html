<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Kite Options Chain</title>
<style>
/*
 * Widget CSS: Self-contained by MCP protocol requirement.
 * Variables mirror dashboard-base.css tokens but MUST be inline
 * because MCP widgets are served as standalone HTML blobs.
 * Canonical token definitions: dashboard-base.css
 */
:root {
  --bg-0: var(--mcp-ui-bg-primary, #0a0c10);
  --bg-1: var(--mcp-ui-bg-secondary, #0f1218);
  --bg-2: var(--mcp-ui-bg-tertiary, #161b24);
  --bg-3: #1e2430;
  --border: var(--mcp-ui-border-color, #252d3a); --border-hi: #334155;
  --text-0: var(--mcp-ui-text-primary, #e2e8f0);
  --text-1: var(--mcp-ui-text-secondary, #94a3b8);
  --text-2: var(--mcp-ui-text-tertiary, #64748b);
  --accent: var(--mcp-ui-accent-color, #22d3ee); --accent-dim: rgba(34,211,238,0.12);
  --green: var(--mcp-ui-success-color, #34d399); --green-dim: rgba(52,211,153,0.12);
  --red: var(--mcp-ui-error-color, #f87171); --red-dim: rgba(248,113,113,0.1);
  --amber: var(--mcp-ui-warning-color, #fbbf24); --amber-dim: rgba(251,191,36,0.1);
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html.light {
  --bg-0: #ffffff; --bg-1: #f8fafc; --bg-2: #f1f5f9; --bg-3: #e2e8f0;
  --border: #e2e8f0; --border-hi: #cbd5e1;
  --text-0: #0f172a; --text-1: #475569; --text-2: #94a3b8;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--bg-1); border-bottom: 1px solid var(--border); }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.header-sep { width: 1px; height: 16px; background: var(--border); }
.header-title { font-size: 13px; font-weight: 500; color: var(--text-1); }
.header-actions { display: flex; align-items: center; gap: 8px; }
.header-link { font-size: 11px; color: var(--text-2); text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 3px; }
.header-link:hover { color: var(--accent); }
.icon-btn { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); font-size: 13px; cursor: pointer; transition: all 0.12s; line-height: 1; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Search bar */
.search-bar { display: flex; gap: 8px; padding: 12px 16px; align-items: center; }
.search-input { flex: 1; max-width: 200px; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-0); font-family: var(--mono); font-size: 12px; outline: none; text-transform: uppercase; }
.search-input::placeholder { color: var(--text-2); text-transform: none; }
.search-input:focus { border-color: var(--accent); }
.load-btn { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent); font-family: var(--sans); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; text-transform: uppercase; letter-spacing: 0.04em; }
.load-btn:hover { background: var(--accent); color: var(--bg-0); }
.load-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 16px 12px; }
.summary-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.summary-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 4px; }
.summary-value { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text-0); }

/* Chain table */
.section { padding: 0 16px; }
.section-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin: 12px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.expiry-label { font-family: var(--mono); font-size: 10px; color: var(--accent); }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 6px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg-2); }
th.r, td.r { text-align: right; }
th.c, td.c { text-align: center; }
td { padding: 5px 8px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-1); white-space: nowrap; }
tr:hover td { background: var(--bg-2); }
tr.atm-row td { background: var(--amber-dim); border-top: 1px solid var(--amber); border-bottom: 1px solid var(--amber); }
tr.atm-row:hover td { background: rgba(251,191,36,0.18); }
td.strike-col { text-align: center; font-weight: 700; color: var(--text-0); background: var(--bg-1); position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
td.ce-side { }
td.pe-side { }

/* OI bars */
.oi-cell { position: relative; }
.oi-bar { position: absolute; top: 2px; bottom: 2px; border-radius: 2px; opacity: 0.25; }
.oi-bar.ce { right: 0; background: var(--green); }
.oi-bar.pe { left: 0; background: var(--red); }
.oi-text { position: relative; z-index: 1; }

/* Clickable row */
tr.chain-row { cursor: pointer; }
tr.chain-row:active td { background: var(--bg-3); }

/* Greeks panel (inline expand) */
.greeks-row td { background: var(--bg-1); padding: 0; }
.greeks-panel { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 8px 12px; }
.greeks-panel.loading { display: flex; justify-content: center; align-items: center; padding: 10px; color: var(--text-2); font-size: 11px; }
.greek-item { text-align: center; }
.greek-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); margin-bottom: 2px; }
.greek-value { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-0); }
.greek-ce { border-left: 2px solid var(--green); padding-left: 6px; }
.greek-pe { border-left: 2px solid var(--red); padding-left: 6px; }

/* Color utilities */
.green { color: var(--green); }
.red { color: var(--red); }
.amber { color: var(--amber); }

/* Empty / idle state */
.idle-state { text-align: center; padding: 40px 16px; }
.idle-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
.idle-title { font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
.idle-sub { font-size: 12px; color: var(--text-2); max-width: 300px; margin: 0 auto; }
.quick-btns { display: flex; gap: 6px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.quick-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.12s; }
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Error state */
.error-state { text-align: center; padding: 20px 16px; color: var(--red); font-size: 12px; }

/* Footer */
.footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; margin-top: 12px; border-top: 1px solid var(--border); }
.footer-ts { font-family: var(--mono); font-size: 10px; color: var(--text-2); }
.refresh-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); font-size: 11px; font-family: var(--sans); font-weight: 500; cursor: pointer; transition: all 0.12s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Fullscreen mode */
html.fullscreen body { font-size: 14px; }
html.fullscreen .summary-value { font-size: 20px; }
html.fullscreen table { font-size: 14px; }
html.fullscreen td { font-size: 13px; padding: 7px 10px; }
html.fullscreen th { font-size: 11px; padding: 8px 10px; }

/* Greek cells are narrow — tighten padding so 17-col table still scans */
td.greek-col, th.greek-col { padding: 5px 4px; font-size: 10.5px; letter-spacing: 0; color: var(--text-1); }
th.greek-col { font-size: 9.5px; }
td.greek-col.muted { color: var(--text-2); }

/* Responsive: hide inline Greek columns on small screens — the per-strike
 * expand panel still shows them, pre-populated from the same chain payload. */
@media (max-width: 480px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .summary-value { font-size: 14px; }
  .greeks-panel { grid-template-columns: repeat(3, 1fr); }
  th.greek-col, td.greek-col { display: none; }
}
/* On tablet widths show only Delta + IV inline; hide Gamma/Theta/Vega cols. */
@media (min-width: 481px) and (max-width: 900px) {
  th.greek-col.secondary, td.greek-col.secondary { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span>
    <span class="header-sep"></span>
    <span class="header-title">Options Chain</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="fullscreenBtn" title="Toggle fullscreen">&#x26F6;</button>
    <a class="header-link" id="dashLink" title="Open full dashboard">&#8599; Full Dashboard</a>
  </div>
</div>

<div class="search-bar">
  <input type="text" class="search-input" id="underlyingInput" placeholder="e.g. NIFTY" spellcheck="false" autocomplete="off" aria-label="Search underlying">
  <button class="load-btn" id="loadBtn">Load Chain</button>
</div>

<div id="app"></div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>
// AppBridge v1.0 — canonical source: appbridge.js
const AppBridge = (() => {
  const isIframe = window.parent !== window;
  let nextId = 1;
  const pending = new Map();
  let hostContext = null;

  if (isIframe) {
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      let msg;
      try {
        msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      } catch (e) { return; }
      if (!msg || msg.jsonrpc !== '2.0') return;

      if (msg.id != null && pending.has(msg.id)) {
        const {resolve, reject} = pending.get(msg.id);
        pending.delete(msg.id);
        if (msg.error) reject(new Error(msg.error.message || 'RPC error'));
        else resolve(msg.result);
        return;
      }

      if (msg.method === 'ping' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/resource-teardown' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/notifications/host-context-changed' && msg.params) {
        hostContext = Object.assign({}, hostContext, msg.params);
        applyHostTheme(hostContext);
      }
    });
  }

  function sendRequest(method, params) {
    if (!isIframe) return Promise.reject(new Error('Not in iframe'));
    return new Promise((resolve, reject) => {
      const id = nextId++;
      pending.set(id, {resolve, reject});
      window.parent.postMessage({jsonrpc: '2.0', id, method, params}, '*');
      setTimeout(() => {
        if (pending.has(id)) { pending.delete(id); reject(new Error('Timeout')); }
      }, 30000);
    });
  }

  async function init() {
    if (!isIframe) return null;
    const result = await sendRequest('ui/initialize', {
      protocolVersion: '2026-01-26',
      appInfo: { name: 'Kite Widget', version: '1.0.0' },
      appCapabilities: {},
    });
    hostContext = result.hostContext || null;
    if (hostContext) applyHostTheme(hostContext);
    window.parent.postMessage({jsonrpc: '2.0', method: 'ui/notifications/initialized'}, '*');
    return result;
  }

  async function callServerTool(name, args) {
    const result = await sendRequest('tools/call', { name, arguments: args || {} });
    if (result && result.content && result.content[0] && result.content[0].text) {
      try { return JSON.parse(result.content[0].text); } catch(e) {}
      return result.content[0].text;
    }
    return result;
  }

  function openLink(url) {
    if (!isIframe) { window.open(url, '_blank'); return; }
    sendRequest('ui/open-link', { url }).catch(() => window.open(url, '_blank'));
  }

  function applyHostTheme(ctx) {
    if (!ctx) return;
    if (ctx.theme === 'light') document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
  }

  function notifySize() {
    if (!isIframe) return;
    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/notifications/size-changed',
      params: { width: document.documentElement.scrollWidth, height: document.documentElement.scrollHeight }
    }, '*');
  }

  if (typeof ResizeObserver !== 'undefined') {
    let resizeTimer;
    new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => notifySize(), 100);
    }).observe(document.body);
  }

  async function sendMessage(text) {
    return sendRequest('ui/message', {
      role: 'user',
      content: [{ type: 'text', text }]
    });
  }

  async function updateModelContext(text) {
    return sendRequest('ui/update-model-context', {
      content: [{ type: 'text', text }]
    });
  }

  async function requestDisplayMode(mode) {
    return sendRequest('ui/request-display-mode', { mode });
  }

  async function downloadFile(filename, mimeType, data) {
    return sendRequest('ui/download-file', { filename, mimeType, data: btoa(data) });
  }

  return { init, callServerTool, openLink, notifySize,
    sendMessage, updateModelContext, requestDisplayMode, downloadFile,
    get isIframe() { return isIframe; } };
})();

// --- Formatting helpers ---
function fmtNum(n, d) {
  if (n == null || isNaN(n)) return '--';
  d = d != null ? d : 2;
  return n.toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtINR(n) {
  if (n == null || isNaN(n)) return '--';
  const neg = n < 0;
  const abs = Math.abs(n);
  const parts = abs.toFixed(2).split('.');
  let intPart = parts[0];
  const decPart = parts[1];
  if (intPart.length > 3) {
    const last3 = intPart.slice(-3);
    let rest = intPart.slice(0, -3);
    const groups = [];
    while (rest.length > 2) { groups.unshift(rest.slice(-2)); rest = rest.slice(0, -2); }
    if (rest.length > 0) groups.unshift(rest);
    intPart = groups.join(',') + ',' + last3;
  }
  return (neg ? '-' : '') + '\u20B9' + intPart + '.' + decPart;
}

function fmtOI(n) {
  if (n == null || isNaN(n) || n === 0) return '--';
  if (n >= 10000000) return (n / 10000000).toFixed(2) + ' Cr';
  if (n >= 100000) return (n / 100000).toFixed(2) + ' L';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function fmtVol(n) {
  if (n == null || isNaN(n) || n === 0) return '--';
  if (n >= 10000000) return (n / 10000000).toFixed(1) + 'Cr';
  if (n >= 100000) return (n / 100000).toFixed(1) + 'L';
  if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
  return String(n);
}

// --- DOM helpers ---
function el(tag, className, textContent) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (textContent != null) e.textContent = String(textContent);
  return e;
}

function td(text, classes) {
  const cell = el('td', classes || '');
  cell.textContent = text != null ? String(text) : '';
  return cell;
}

function th(text, classes) {
  const cell = el('th', classes || '');
  cell.textContent = text != null ? String(text) : '';
  return cell;
}

// --- State ---
let currentChain = null;   // last loaded chain response
let expandedStrike = null;  // currently expanded strike (or null)
let expandedType = null;    // 'CE' or 'PE' for the expanded greeks row
let greeksCache = {};       // unused since Greeks arrive inline; kept for back-compat

// --- Idle State ---
function showIdle() {
  const app = document.getElementById('app');
  app.textContent = '';

  const idle = el('div', 'idle-state');
  idle.appendChild(el('div', 'idle-icon', '\u2637'));
  idle.appendChild(el('div', 'idle-title', 'Options Chain'));
  idle.appendChild(el('div', 'idle-sub', 'Enter an underlying symbol above to load the option chain with live OI, volume, and Black-Scholes Greeks (\u0394, \u0393, \u0398, V, IV) inline per strike.'));

  const quickBtns = el('div', 'quick-btns');
  var underlyings = ['NIFTY', 'BANKNIFTY', 'FINNIFTY', 'SENSEX', 'RELIANCE', 'TCS'];
  for (var i = 0; i < underlyings.length; i++) {
    (function(sym) {
      var btn = el('button', 'quick-btn', sym);
      btn.addEventListener('click', function() { loadChain(sym); });
      quickBtns.appendChild(btn);
    })(underlyings[i]);
  }
  idle.appendChild(quickBtns);
  app.appendChild(idle);
}

function showError(msg) {
  var app = document.getElementById('app');
  app.textContent = '';
  app.appendChild(el('div', 'error-state', msg));
}

// --- Load chain via AppBridge ---
async function loadChain(underlying) {
  if (!underlying) return;
  underlying = underlying.trim().toUpperCase();
  document.getElementById('underlyingInput').value = underlying;

  var btn = document.getElementById('loadBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  expandedStrike = null;
  expandedType = null;
  greeksCache = {};

  try {
    var result = await AppBridge.callServerTool('get_option_chain', { underlying: underlying });
    if (result && result.error) {
      showError(result.error);
      return;
    }
    if (!result || !result.chain) {
      showError('No data returned for ' + underlying);
      return;
    }
    currentChain = result;
    renderChain(result);
    requestAnimationFrame(function() { AppBridge.notifySize(); });
  } catch (e) {
    showError('Failed to load: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Load Chain';
  }
}

// --- Render the full chain ---
function renderChain(data) {
  var app = document.getElementById('app');
  app.textContent = '';

  // Summary cards
  var summaryGrid = el('div', 'summary-grid');
  var items = [
    { label: 'Spot Price', value: fmtINR(data.spot_price) },
    { label: 'ATM Strike', value: fmtNum(data.atm_strike, 0) },
    { label: 'PCR', value: fmtNum(data.pcr, 2), cls: data.pcr > 1 ? 'green' : data.pcr < 0.7 ? 'red' : '' },
    { label: 'Max Pain', value: fmtNum(data.max_pain, 0) }
  ];
  for (var i = 0; i < items.length; i++) {
    var card = el('div', 'summary-card');
    card.setAttribute('role', 'status');
    card.setAttribute('aria-label', items[i].label);
    card.appendChild(el('div', 'summary-label', items[i].label));
    var valDiv = el('div', 'summary-value' + (items[i].cls ? ' ' + items[i].cls : ''), items[i].value);
    card.appendChild(valDiv);
    summaryGrid.appendChild(card);
  }
  app.appendChild(summaryGrid);

  // Chain section
  var section = el('div', 'section');
  var hdr = el('div', 'section-header');
  hdr.appendChild(el('span', '', data.underlying + ' Chain'));
  hdr.appendChild(el('span', 'expiry-label', 'Expiry: ' + data.expiry));
  section.appendChild(hdr);

  // Find max OI for bar scaling
  var maxOI = 0;
  var chain = data.chain || [];
  for (var i = 0; i < chain.length; i++) {
    if (chain[i].ce_oi > maxOI) maxOI = chain[i].ce_oi;
    if (chain[i].pe_oi > maxOI) maxOI = chain[i].pe_oi;
  }

  var wrap = el('div', 'tbl-wrap');
  var table = document.createElement('table');
  table.setAttribute('role', 'table');
  table.setAttribute('aria-label', 'Option chain');

  // Header
  // Layout (left to right, with responsive hiding):
  //   CE side:  Vol | OI | LTP | Delta | IV | Gamma | Theta | Vega
  //   Center:   Strike
  //   PE side:  Vega | Theta | Gamma | IV | Delta | LTP | OI | Vol
  // On tablets (<=900px) Gamma/Theta/Vega hide (secondary cols).
  // On mobile  (<=480px) all greek cols hide; expand panel still shows them.
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  // CE header group
  headRow.appendChild(th('CE Vol', 'r'));
  headRow.appendChild(th('CE OI', 'r'));
  headRow.appendChild(th('CE LTP', 'r'));
  headRow.appendChild(th('\u0394', 'r greek-col'));         // Delta
  headRow.appendChild(th('IV%', 'r greek-col'));
  headRow.appendChild(th('\u0393', 'r greek-col secondary')); // Gamma
  headRow.appendChild(th('\u0398', 'r greek-col secondary')); // Theta
  headRow.appendChild(th('V', 'r greek-col secondary'));       // Vega
  headRow.appendChild(th('Strike', 'c'));
  headRow.appendChild(th('V', 'greek-col secondary'));         // PE Vega
  headRow.appendChild(th('\u0398', 'greek-col secondary'));    // PE Theta
  headRow.appendChild(th('\u0393', 'greek-col secondary'));    // PE Gamma
  headRow.appendChild(th('IV%', 'greek-col'));
  headRow.appendChild(th('\u0394', 'greek-col'));              // PE Delta
  headRow.appendChild(th('PE LTP', ''));
  headRow.appendChild(th('PE OI', ''));
  headRow.appendChild(th('PE Vol', ''));
  thead.appendChild(headRow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  tbody.id = 'chainBody';

  for (var i = 0; i < chain.length; i++) {
    var row = chain[i];
    var isATM = (row.strike === data.atm_strike);
    appendChainRow(tbody, row, isATM, maxOI, data);
  }

  table.appendChild(tbody);
  wrap.appendChild(table);
  section.appendChild(wrap);
  app.appendChild(section);

  // Footer
  var now = new Date();
  var ts = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false })
    + ' ' + now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

  var footer = el('div', 'footer');
  footer.appendChild(el('span', 'footer-ts', 'Loaded ' + ts));
  var refreshBtn = el('button', 'refresh-btn', 'Refresh');
  refreshBtn.addEventListener('click', function() {
    if (currentChain) loadChain(currentChain.underlying);
  });
  footer.appendChild(refreshBtn);
  app.appendChild(footer);
}

// fmtGreek returns a formatted greek value or an em-dash when absent/zero.
// Greeks in the chain payload arrive as omitempty — JSON omits zeros — so a
// strict `== null` check misses strikes where the IV solver failed. Treat
// zero as "missing" for display; true zero-delta options are edge cases and
// still render as "0.0000" if explicitly non-zero.
function fmtGreek(v, decimals) {
  if (v == null || isNaN(v) || v === 0) return '\u2014';
  return fmtNum(v, decimals);
}

function greekTd(value, decimals, extraCls) {
  var cell = document.createElement('td');
  cell.className = 'r greek-col' + (extraCls ? ' ' + extraCls : '');
  if (value == null || isNaN(value) || value === 0) {
    cell.className += ' muted';
    cell.textContent = '\u2014';
  } else {
    cell.textContent = fmtNum(value, decimals);
  }
  return cell;
}

// Like greekTd but aligned left for PE side so the Greek cluster mirrors CE.
function peGreekTd(value, decimals, extraCls) {
  var cell = document.createElement('td');
  cell.className = 'greek-col' + (extraCls ? ' ' + extraCls : '');
  if (value == null || isNaN(value) || value === 0) {
    cell.className += ' muted';
    cell.textContent = '\u2014';
  } else {
    cell.textContent = fmtNum(value, decimals);
  }
  return cell;
}

function appendChainRow(tbody, row, isATM, maxOI, data) {
  var tr = document.createElement('tr');
  tr.className = 'chain-row' + (isATM ? ' atm-row' : '');

  // CE Volume
  tr.appendChild(td(fmtVol(row.ce_volume), 'r'));

  // CE OI with bar
  var ceOiTd = document.createElement('td');
  ceOiTd.className = 'r oi-cell';
  if (row.ce_oi > 0 && maxOI > 0) {
    var bar = el('div', 'oi-bar ce');
    bar.style.width = ((row.ce_oi / maxOI) * 100).toFixed(1) + '%';
    ceOiTd.appendChild(bar);
  }
  ceOiTd.appendChild(el('span', 'oi-text', fmtOI(row.ce_oi)));
  tr.appendChild(ceOiTd);

  // CE LTP
  tr.appendChild(td(row.ce_ltp > 0 ? fmtNum(row.ce_ltp) : '--', 'r'));

  // CE Greeks inline: Delta, IV, (Gamma, Theta, Vega — secondary).
  tr.appendChild(greekTd(row.ce_delta, 4));
  tr.appendChild(greekTd(row.ce_iv, 1));
  tr.appendChild(greekTd(row.ce_gamma, 5, 'secondary'));
  tr.appendChild(greekTd(row.ce_theta, 2, 'secondary'));
  tr.appendChild(greekTd(row.ce_vega, 2, 'secondary'));

  // Strike
  tr.appendChild(td(fmtNum(row.strike, 0), 'strike-col'));

  // PE Greeks inline (mirror: Vega, Theta, Gamma secondary; then IV, Delta).
  tr.appendChild(peGreekTd(row.pe_vega, 2, 'secondary'));
  tr.appendChild(peGreekTd(row.pe_theta, 2, 'secondary'));
  tr.appendChild(peGreekTd(row.pe_gamma, 5, 'secondary'));
  tr.appendChild(peGreekTd(row.pe_iv, 1));
  tr.appendChild(peGreekTd(row.pe_delta, 4));

  // PE LTP
  tr.appendChild(td(row.pe_ltp > 0 ? fmtNum(row.pe_ltp) : '--', ''));

  // PE OI with bar
  var peOiTd = document.createElement('td');
  peOiTd.className = 'oi-cell';
  if (row.pe_oi > 0 && maxOI > 0) {
    var bar = el('div', 'oi-bar pe');
    bar.style.width = ((row.pe_oi / maxOI) * 100).toFixed(1) + '%';
    peOiTd.appendChild(bar);
  }
  peOiTd.appendChild(el('span', 'oi-text', fmtOI(row.pe_oi)));
  tr.appendChild(peOiTd);

  // PE Volume
  tr.appendChild(td(fmtVol(row.pe_volume), ''));

  // Click handler: expand greeks row (now pre-populated from the chain payload)
  (function(strike, rowData, chainData) {
    tr.addEventListener('click', function() {
      toggleGreeks(strike, rowData, chainData);
    });
  })(row.strike, row, data);

  tbody.appendChild(tr);
}

// --- Greeks expand/collapse ---
// The expand panel is no longer a separate tool call. Greeks arrive inline
// on every chain row (ce_delta, ce_gamma, ce_theta, ce_vega, ce_iv, and the
// PE equivalents), so we can render the full panel synchronously from
// whatever the server sent us. A zero value means the IV solver rejected
// that strike (price < intrinsic, or market closed) — shown as an em-dash.
function toggleGreeks(strike, rowData, chainData) {
  var tbody = document.getElementById('chainBody');
  if (!tbody) return;

  // If already expanded on this strike, collapse it
  if (expandedStrike === strike) {
    var existing = document.getElementById('greeks-' + strike);
    if (existing) existing.remove();
    expandedStrike = null;
    expandedType = null;
    requestAnimationFrame(function() { AppBridge.notifySize(); });
    return;
  }

  // Collapse any existing expanded row
  if (expandedStrike !== null) {
    var old = document.getElementById('greeks-' + expandedStrike);
    if (old) old.remove();
  }

  expandedStrike = strike;

  // Find the chain row in tbody
  var rows = tbody.querySelectorAll('tr.chain-row');
  var targetRow = null;
  for (var i = 0; i < rows.length; i++) {
    var strikeTd = rows[i].querySelector('.strike-col');
    if (strikeTd && parseFloat(strikeTd.textContent.replace(/,/g, '')) === strike) {
      targetRow = rows[i];
      break;
    }
  }
  if (!targetRow) return;

  // Create greeks row
  var greeksTr = document.createElement('tr');
  greeksTr.className = 'greeks-row';
  greeksTr.id = 'greeks-' + strike;
  var greeksTd = document.createElement('td');
  // Table has 17 columns: 8 CE (Vol, OI, LTP, Delta, IV, Gamma, Theta, Vega)
  // + Strike + 8 PE (Vega, Theta, Gamma, IV, Delta, LTP, OI, Vol). Colspan
  // must match so the expanded Greeks panel stretches full table width.
  greeksTd.colSpan = 17;

  var panel = el('div', 'greeks-panel');
  greeksTd.appendChild(panel);
  greeksTr.appendChild(greeksTd);

  // Insert after the target row
  if (targetRow.nextSibling) {
    tbody.insertBefore(greeksTr, targetRow.nextSibling);
  } else {
    tbody.appendChild(greeksTr);
  }

  // Render synchronously from inline data — no tool call.
  renderGreeksPanel(panel, rowData, rowData, chainData);

  requestAnimationFrame(function() { AppBridge.notifySize(); });
}

// Compute moneyness client-side since the chain response carries spot + strike
// but not the decorated label the old options_greeks tool used.
function computeMoneyness(spot, strike, isCall) {
  if (!spot || !strike) return '--';
  var band = strike * 0.005;
  if (isCall) {
    if (spot > strike + band) return 'ITM';
    if (spot < strike - band) return 'OTM';
    return 'ATM';
  }
  if (spot < strike - band) return 'ITM';
  if (spot > strike + band) return 'OTM';
  return 'ATM';
}

function renderGreeksPanel(panel, ceRow, peRow, chainData) {
  panel.className = 'greeks-panel';
  panel.textContent = '';

  var spot = chainData ? chainData.spot_price : 0;
  var strike = ceRow ? ceRow.strike : (peRow ? peRow.strike : 0);

  // CE Greeks column — reads directly from the chain row fields (ce_*).
  var ceHeader = el('div', 'greek-item');
  ceHeader.appendChild(el('div', 'greek-label', 'CE Greeks'));
  ceHeader.appendChild(el('div', 'greek-value green', computeMoneyness(spot, strike, true)));
  panel.appendChild(ceHeader);

  var ceFields = [
    { label: 'Delta', key: 'ce_delta', fmt: 4 },
    { label: 'IV %',  key: 'ce_iv',    fmt: 1 },
    { label: 'Theta', key: 'ce_theta', fmt: 2 },
    { label: 'Gamma', key: 'ce_gamma', fmt: 5 },
    { label: 'Vega',  key: 'ce_vega',  fmt: 2 }
  ];

  for (var i = 0; i < ceFields.length; i++) {
    var item = el('div', 'greek-item greek-ce');
    item.appendChild(el('div', 'greek-label', ceFields[i].label));
    var val = ceRow ? ceRow[ceFields[i].key] : null;
    item.appendChild(el('div', 'greek-value', fmtGreek(val, ceFields[i].fmt)));
    panel.appendChild(item);
  }

  // PE Greeks column — reads directly from the chain row fields (pe_*).
  var peHeader = el('div', 'greek-item');
  peHeader.appendChild(el('div', 'greek-label', 'PE Greeks'));
  peHeader.appendChild(el('div', 'greek-value red', computeMoneyness(spot, strike, false)));
  panel.appendChild(peHeader);

  var peFields = [
    { label: 'Delta', key: 'pe_delta', fmt: 4 },
    { label: 'IV %',  key: 'pe_iv',    fmt: 1 },
    { label: 'Theta', key: 'pe_theta', fmt: 2 },
    { label: 'Gamma', key: 'pe_gamma', fmt: 5 },
    { label: 'Vega',  key: 'pe_vega',  fmt: 2 }
  ];

  for (var i = 0; i < peFields.length; i++) {
    var item = el('div', 'greek-item greek-pe');
    item.appendChild(el('div', 'greek-label', peFields[i].label));
    var val = peRow ? peRow[peFields[i].key] : null;
    item.appendChild(el('div', 'greek-value', fmtGreek(val, peFields[i].fmt)));
    panel.appendChild(item);
  }
}

// --- Fullscreen toggle ---
async function toggleFullscreen() {
  var current = document.documentElement.classList.contains('fullscreen');
  var result = await AppBridge.requestDisplayMode(current ? 'inline' : 'fullscreen');
  if (result && result.granted !== false) {
    document.documentElement.classList.toggle('fullscreen');
  }
}

// --- Event listeners ---
document.getElementById('loadBtn').addEventListener('click', function() {
  loadChain(document.getElementById('underlyingInput').value);
});

document.getElementById('underlyingInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    loadChain(this.value);
  }
});

document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

document.getElementById('dashLink').addEventListener('click', function(e) {
  e.preventDefault();
  var baseUrl = (window.__DATA__ && window.__DATA__.external_url) || 'https://kite-mcp-server.fly.dev';
  AppBridge.openLink(baseUrl + '/dashboard/options');
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.dropdown-open').forEach(function(el) { el.classList.remove('dropdown-open'); });
  }
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
    location.reload();
  }
});

// --- Init ---
(async function() {
  AppBridge.init().catch(function() {});
  try { showIdle(); } catch(e) {
    var app = document.querySelector('.content') || document.getElementById('app') || document.body;
    var errDiv = document.createElement('div');
    errDiv.style.cssText = 'padding:40px;text-align:center;color:var(--red,#f87171);font-size:13px;';
    errDiv.textContent = 'Widget error: ' + (e.message || 'Unknown error');
    app.textContent = '';
    app.appendChild(errDiv);
    if (typeof AppBridge !== 'undefined') AppBridge.notifySize();
  }
  requestAnimationFrame(function() { AppBridge.notifySize(); });

  if (typeof ResizeObserver !== 'undefined') {
    var resizeTimer;
    new ResizeObserver(function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() { AppBridge.notifySize(); }, 100);
    }).observe(document.body);
  }
})();
</script>
