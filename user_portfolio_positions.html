{{define "user_portfolio_positions"}}
{{if .Positions}}
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th>Symbol</th><th>Exchange</th><th>Product</th><th class="right">Qty</th>
      <th class="right">Avg Price</th><th class="right">LTP</th><th class="right">P&amp;L</th>
    </tr></thead>
    <tbody>
    {{range .Positions}}
    <tr>
      <td style="font-weight:600;color:var(--text-0)">{{.Tradingsymbol}}</td>
      <td>{{.Exchange}}</td>
      <td><span class="badge badge-amber">{{.Product}}</span></td>
      <td class="right">{{.Quantity}}</td>
      <td class="right" style="font-family:var(--mono);font-size:12px">{{.AvgPriceFmt}}</td>
      <td class="right" style="font-family:var(--mono);font-size:12px">{{.LastPriceFmt}}</td>
      <td class="right {{.PnLClass}}" style="font-family:var(--mono);font-weight:600">{{.PnLFmt}}</td>
    </tr>
    {{end}}
    </tbody>
  </table>
</div>
{{else}}
<div class="empty-state">No open positions</div>
{{end}}
{{end}}
