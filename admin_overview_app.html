<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Admin Overview · Kite MCP</title>
<style>
:root {
  --bg-0: var(--mcp-ui-bg-primary, #0a0c10);
  --bg-1: var(--mcp-ui-bg-secondary, #0f1218);
  --bg-2: var(--mcp-ui-bg-tertiary, #161b24);
  --bg-3: #1e2430;
  --border: var(--mcp-ui-border-color, #252d3a); --border-hi: #334155;
  --text-0: var(--mcp-ui-text-primary, #e2e8f0);
  --text-1: var(--mcp-ui-text-secondary, #94a3b8);
  --text-2: var(--mcp-ui-text-tertiary, #64748b);
  --accent: var(--mcp-ui-accent-color, #22d3ee);
  --green: var(--mcp-ui-success-color, #34d399);
  --red: var(--mcp-ui-error-color, #f87171);
  --amber: var(--mcp-ui-warning-color, #fbbf24);
  --accent-dim: rgba(34,211,238,0.12); --green-dim: rgba(52,211,153,0.12);
  --red-dim: rgba(248,113,113,0.1); --amber-dim: rgba(251,191,36,0.1);
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html.light {
  --bg-0: #ffffff; --bg-1: #f8fafc; --bg-2: #f1f5f9; --bg-3: #e2e8f0;
  --border: #e2e8f0; --border-hi: #cbd5e1;
  --text-0: #0f172a; --text-1: #475569; --text-2: #94a3b8;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); -webkit-font-smoothing: antialiased; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-1); }
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.sep { width: 1px; height: 16px; background: var(--border); }
.title { font-size: 13px; font-weight: 500; color: var(--text-1); }
.content { padding: 16px 20px; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.freeze-banner { padding: 12px 16px; border-radius: 6px; margin-bottom: 18px; font-size: 13px; }
.freeze-banner.frozen { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
.freeze-banner.clear { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
.freeze-meta { font-family: var(--mono); font-size: 11px; color: var(--text-1); margin-top: 4px; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.footer { padding: 10px 20px; margin-top: 12px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-2); display: flex; justify-content: space-between; }
.auth-error { text-align: center; padding: 40px 16px; color: var(--text-2); font-size: 13px; }
.auth-error strong { color: var(--red); }
@media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } .content { padding: 12px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span><span class="sep"></span><span class="title">Admin Overview</span>
  </div>
</div>
<div class="content">
  <div id="freezeBanner"></div>
  <div class="stats-row" id="statsRow1"></div>
  <div class="section-title">Runtime</div>
  <div class="stats-row" id="statsRow2"></div>
</div>
<div class="footer"><span id="footerVersion"></span><span id="footerTs"></span></div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>
const AppBridge=(()=>{const isIframe=window.parent!==window;let nextId=1;const pending=new Map();let hostContext=null;if(isIframe){window.addEventListener('message',event=>{if(event.source!==window.parent)return;let msg;try{msg=typeof event.data==='string'?JSON.parse(event.data):event.data}catch(e){return}if(!msg||msg.jsonrpc!=='2.0')return;if(msg.id!=null&&pending.has(msg.id)){const{resolve,reject}=pending.get(msg.id);pending.delete(msg.id);if(msg.error)reject(new Error(msg.error.message||'RPC error'));else resolve(msg.result);return}if(msg.method==='ping'&&msg.id!=null){window.parent.postMessage({jsonrpc:'2.0',id:msg.id,result:{}},'*');return}if(msg.method==='ui/resource-teardown'&&msg.id!=null){window.parent.postMessage({jsonrpc:'2.0',id:msg.id,result:{}},'*');return}if(msg.method==='ui/notifications/host-context-changed'&&msg.params){hostContext=Object.assign({},hostContext,msg.params);if(hostContext.theme==='light')document.documentElement.classList.add('light');else document.documentElement.classList.remove('light')}})}function sendRequest(method,params){if(!isIframe)return Promise.reject(new Error('Not in iframe'));return new Promise((resolve,reject)=>{const id=nextId++;pending.set(id,{resolve,reject});window.parent.postMessage({jsonrpc:'2.0',id,method,params},'*');setTimeout(()=>{if(pending.has(id)){pending.delete(id);reject(new Error('Timeout'))}},30000)})}async function init(){if(!isIframe)return null;const result=await sendRequest('ui/initialize',{protocolVersion:'2026-01-26',appInfo:{name:'Kite Widget',version:'1.0.0'},appCapabilities:{}});hostContext=result.hostContext||null;if(hostContext&&hostContext.theme==='light')document.documentElement.classList.add('light');window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');return result}function openLink(url){if(!isIframe){window.open(url,'_blank');return}sendRequest('ui/open-link',{url}).catch(()=>{window.open(url,'_blank')})}function notifySize(){if(!isIframe)return;window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:document.documentElement.scrollWidth,height:document.documentElement.scrollHeight}},'*')}if(typeof ResizeObserver!=='undefined'){let t;new ResizeObserver(()=>{clearTimeout(t);t=setTimeout(()=>notifySize(),100)}).observe(document.body)}return{init,openLink,notifySize,get isIframe(){return isIframe}}})();

function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = String(text); return e; }
function clearEl(n) { while (n.firstChild) n.removeChild(n.firstChild); }
function makeStat(label, value, cls) { const c = el('div','stat'); c.appendChild(el('div','stat-label',label)); c.appendChild(el('div','stat-value'+(cls?' '+cls:''),value)); return c; }

function render() {
  const data = window.__DATA__;
  if (!data || typeof data !== 'object' || Object.keys(data).length === 0) {
    const fb = document.getElementById('freezeBanner');
    clearEl(fb);
    const err = el('div', 'auth-error');
    err.appendChild(el('strong', '', 'Not authenticated'));
    err.appendChild(document.createElement('br'));
    err.appendChild(document.createTextNode('Admin access required'));
    fb.appendChild(err);
    AppBridge.notifySize();
    return;
  }

  const fb = document.getElementById('freezeBanner');
  clearEl(fb);
  const gf = data.global_freeze || {};
  if (gf.is_frozen) {
    const banner = el('div', 'freeze-banner frozen');
    banner.appendChild(el('strong', '', 'GLOBAL FREEZE ACTIVE'));
    if (gf.frozen_by) banner.appendChild(el('div', 'freeze-meta', 'Frozen by: ' + gf.frozen_by));
    if (gf.reason) banner.appendChild(el('div', 'freeze-meta', 'Reason: ' + gf.reason));
    fb.appendChild(banner);
  } else {
    fb.appendChild(el('div', 'freeze-banner clear', 'Trading: Normal'));
  }

  const sr1 = document.getElementById('statsRow1');
  clearEl(sr1);
  sr1.appendChild(makeStat('Active Sessions', data.active_sessions != null ? String(data.active_sessions) : '--', 'accent'));
  sr1.appendChild(makeStat('Total Users', data.total_users != null ? String(data.total_users) : '--', 'green'));
  sr1.appendChild(makeStat('Uptime', data.uptime || '--', ''));

  const sr2 = document.getElementById('statsRow2');
  clearEl(sr2);
  sr2.appendChild(makeStat('Goroutines', data.goroutines != null ? String(data.goroutines) : '--', 'accent'));
  sr2.appendChild(makeStat('Heap MB', data.heap_alloc_mb != null ? Number(data.heap_alloc_mb).toFixed(1) : '--', 'amber'));
  sr2.appendChild(makeStat('GC Pause', data.gc_pause_ms != null ? Number(data.gc_pause_ms).toFixed(2) + 'ms' : '--', ''));

  document.getElementById('footerVersion').textContent = data.go_version || '';
  const now = new Date();
  document.getElementById('footerTs').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  AppBridge.notifySize();
}

(async () => {
  try { await AppBridge.init(); } catch(e) {}
  if (typeof window.__DATA__ === 'string') { try { window.__DATA__ = JSON.parse(window.__DATA__); } catch(e) { window.__DATA__ = null; } }
  render();
})();
</script>
</body>
</html>
