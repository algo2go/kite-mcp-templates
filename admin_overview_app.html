<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Admin Overview · Kite MCP</title>
<style>
/*__INJECTED_CSS__*/

.title { font-size: 13px; font-weight: 500; color: var(--text-1); }
.content { padding: 16px 20px; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.freeze-banner { padding: 12px 16px; border-radius: 6px; margin-bottom: 18px; font-size: 13px; }
.freeze-banner.frozen { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
.freeze-banner.clear { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
.freeze-meta { font-family: var(--mono); font-size: 11px; color: var(--text-1); margin-top: 4px; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.footer { padding: 10px 20px; margin-top: 12px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-2); display: flex; justify-content: space-between; }
.auth-error { text-align: center; padding: 40px 16px; color: var(--text-2); font-size: 13px; }
.auth-error strong { color: var(--red); }
@media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } .content { padding: 12px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span><span class="sep"></span><span class="title">Admin Overview</span>
  </div>
</div>
<div class="content">
  <div id="freezeBanner"></div>
  <div class="stats-row" id="statsRow1"></div>
  <div class="section-title">Runtime</div>
  <div class="stats-row" id="statsRow2"></div>
</div>
<div class="footer"><span id="footerVersion"></span><span id="footerTs"></span></div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>

function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = String(text); return e; }

function makeStat(label, value, cls) { const c = el('div','stat'); c.setAttribute('role','status'); c.appendChild(el('div','stat-label',label)); c.appendChild(el('div','stat-value'+(cls?' '+cls:''),value)); return c; }

function render() {
  const data = window.__DATA__;
  if (!data || typeof data !== 'object' || Object.keys(data).length === 0) {
    const fb = document.getElementById('freezeBanner');
    clearEl(fb);
    const err = el('div', 'auth-error');
    err.appendChild(el('strong', '', 'Not authenticated'));
    err.appendChild(document.createElement('br'));
    err.appendChild(document.createTextNode('Admin access required'));
    fb.appendChild(err);
    AppBridge.notifySize();
    return;
  }

  const fb = document.getElementById('freezeBanner');
  clearEl(fb);
  const gf = data.global_freeze || {};
  if (gf.is_frozen) {
    const banner = el('div', 'freeze-banner frozen');
    banner.setAttribute('role', 'alert');
    banner.appendChild(el('strong', '', 'GLOBAL FREEZE ACTIVE'));
    if (gf.frozen_by) banner.appendChild(el('div', 'freeze-meta', 'Frozen by: ' + gf.frozen_by));
    if (gf.reason) banner.appendChild(el('div', 'freeze-meta', 'Reason: ' + gf.reason));
    fb.appendChild(banner);
  } else {
    const clearBanner = el('div', 'freeze-banner clear', 'Trading: Normal');
    clearBanner.setAttribute('role', 'alert');
    fb.appendChild(clearBanner);
  }

  const sr1 = document.getElementById('statsRow1');
  clearEl(sr1);
  sr1.appendChild(makeStat('Active Sessions', data.active_sessions != null ? String(data.active_sessions) : '--', 'accent'));
  sr1.appendChild(makeStat('Total Users', data.total_users != null ? String(data.total_users) : '--', 'green'));
  sr1.appendChild(makeStat('Uptime', data.uptime || '--', ''));

  const sr2 = document.getElementById('statsRow2');
  clearEl(sr2);
  sr2.appendChild(makeStat('Goroutines', data.goroutines != null ? String(data.goroutines) : '--', 'accent'));
  sr2.appendChild(makeStat('Heap MB', data.heap_alloc_mb != null ? Number(data.heap_alloc_mb).toFixed(1) : '--', 'amber'));
  sr2.appendChild(makeStat('GC Pause', data.gc_pause_ms != null ? Number(data.gc_pause_ms).toFixed(2) + 'ms' : '--', ''));

  document.getElementById('footerVersion').textContent = data.go_version || '';
  const now = new Date();
  document.getElementById('footerTs').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  AppBridge.notifySize();
}

(async () => {
  // Show loading state
  const app = document.querySelector('.content') || document.getElementById('app');
  if (app) {
    const loader = document.createElement('div');
    loader.className = 'loading-state';
    loader.textContent = 'Loading...';
    loader.style.cssText = 'text-align:center;padding:40px;color:var(--text-2);font-size:13px;';
    app.appendChild(loader);
  }
  try { await AppBridge.init(); } catch(e) {}
  if (typeof window.__DATA__ === 'string') { try { window.__DATA__ = JSON.parse(window.__DATA__); } catch(e) { window.__DATA__ = null; } }
  try { render(); } catch(e) {
    const app = document.querySelector('.content') || document.body;
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'padding:40px;text-align:center;color:var(--red,#f87171);font-size:13px;';
    errDiv.textContent = 'Widget error: ' + (e.message || 'Unknown error');
    app.textContent = '';
    app.appendChild(errDiv);
    if (typeof AppBridge !== 'undefined') AppBridge.notifySize();
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      // Close any open dropdowns or modals
      document.querySelectorAll('.dropdown-open').forEach(function(el) {
        el.classList.remove('dropdown-open');
      });
    }
    if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
      // Refresh data
      location.reload();

</script>
</body>
</html>
