{{define "overview_stats"}}
{{if .GlobalFrozen}}
<div class="stat-card" style="grid-column: 1 / -1; background: #dc2626; color: #fff; text-align: center; padding: 12px;">
  <strong>GLOBAL TRADING FREEZE ACTIVE</strong> — All order placement is suspended server-wide.
</div>
{{end}}
{{range .Cards}}
<div class="stat-card">
  <div class="stat-label">{{.Label}}</div>
  <div class="stat-value{{if .Class}} {{.Class}}{{end}}">{{.Value}}</div>
</div>
{{end}}
{{end}}
