<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Alerts · Kite MCP</title>
<style>
:root {
  --bg-0: var(--mcp-ui-bg-primary, #0a0c10);
  --bg-1: var(--mcp-ui-bg-secondary, #0f1218);
  --bg-2: var(--mcp-ui-bg-tertiary, #161b24);
  --bg-3: #1e2430;
  --border: var(--mcp-ui-border-color, #252d3a); --border-hi: #334155;
  --text-0: var(--mcp-ui-text-primary, #e2e8f0);
  --text-1: var(--mcp-ui-text-secondary, #94a3b8);
  --text-2: var(--mcp-ui-text-tertiary, #64748b);
  --accent: var(--mcp-ui-accent-color, #22d3ee);
  --green: var(--mcp-ui-success-color, #34d399);
  --red: var(--mcp-ui-error-color, #f87171);
  --amber: var(--mcp-ui-warning-color, #fbbf24);
  --accent-dim: rgba(34,211,238,0.12); --green-dim: rgba(52,211,153,0.12);
  --red-dim: rgba(248,113,113,0.1); --amber-dim: rgba(251,191,36,0.1);
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html.light {
  --bg-0: #ffffff; --bg-1: #f8fafc; --bg-2: #f1f5f9; --bg-3: #e2e8f0;
  --border: #e2e8f0; --border-hi: #cbd5e1;
  --text-0: #0f172a; --text-1: #475569; --text-2: #94a3b8;
  --accent-dim: rgba(34,211,238,0.08); --green-dim: rgba(52,211,153,0.08);
  --red-dim: rgba(248,113,113,0.06); --amber-dim: rgba(251,191,36,0.06);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); -webkit-font-smoothing: antialiased; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-1); }
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.sep { width: 1px; height: 16px; background: var(--border); }
.title { font-size: 13px; font-weight: 500; color: var(--text-1); }
.dash-link { font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; opacity: 0.8; }
.dash-link:hover { opacity: 1; }

.content { padding: 16px 20px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-value.red { color: var(--red); }
.stat-sub { font-family: var(--mono); font-size: 10px; color: var(--text-2); margin-top: 2px; }

.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-1); margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg-2); position: sticky; top: 0; }
th.right, td.right { text-align: right; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--text-1); white-space: nowrap; }
tr:last-child td { border-bottom: none; } tr:hover td { background: var(--bg-2); }
.badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge-green { background: var(--green-dim); color: var(--green); } .badge-red { background: var(--red-dim); color: var(--red); } .badge-amber { background: var(--amber-dim); color: var(--amber); }
.dist-near { color: var(--green); font-weight: 600; } .dist-mid { color: var(--amber); font-weight: 600; } .dist-far { color: var(--text-1); }
.trig-list { display: flex; flex-direction: column; gap: 6px; }
.trig-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.trig-symbol { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-0); min-width: 90px; }
.trig-exch { color: var(--text-2); font-size: 10px; margin-left: 4px; font-weight: 400; }
.trig-detail { font-family: var(--mono); font-size: 11px; color: var(--text-1); flex: 1; }
.trig-time { font-family: var(--mono); font-size: 10px; color: var(--text-2); flex-shrink: 0; }
.del-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-2); font-size: 12px; cursor: pointer; padding: 2px 6px; line-height: 1; transition: all 0.12s; }
.del-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.empty-state { text-align: center; padding: 32px 16px; color: var(--text-2); font-size: 13px; }

.footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; margin-top: 12px; border-top: 1px solid var(--border); }
.footer-ts { font-family: var(--mono); font-size: 10px; color: var(--text-2); }
.refresh-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); font-size: 11px; font-family: var(--sans); font-weight: 500; cursor: pointer; transition: all 0.12s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-error { text-align: center; padding: 40px 16px; color: var(--text-2); font-size: 13px; }
.auth-error strong { color: var(--red); }

@media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } .content { padding: 12px; } .trig-card { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span><span class="sep"></span><span class="title">Alerts</span>
  </div>
  <a href="#" class="dash-link" onclick="AppBridge.openLink('https://kite-mcp-server.fly.dev/dashboard/alerts'); return false;">&#8599; Full Dashboard</a>
</div>

<div class="content">
  <div class="stats-row" id="statsRow"></div>
  <div class="section-title">Active Alerts</div>
  <div id="activeTable"></div>
  <div class="section-title" id="trigTitle" style="margin-top:20px">Triggered History</div>
  <div id="triggeredList"></div>
</div>
<div class="footer" id="footerBar">
  <span class="footer-ts" id="footerTs"></span>
  <span class="footer-ts" style="font-style:italic">Data loaded at page render</span>
</div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>
// AppBridge v1.0 — canonical source: appbridge.js
const AppBridge = (() => {
  const isIframe = window.parent !== window;
  let nextId = 1;
  const pending = new Map();
  let hostContext = null;

  if (isIframe) {
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      let msg;
      try {
        msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      } catch (e) { return; }
      if (!msg || msg.jsonrpc !== '2.0') return;

      if (msg.id != null && pending.has(msg.id)) {
        const {resolve, reject} = pending.get(msg.id);
        pending.delete(msg.id);
        if (msg.error) reject(new Error(msg.error.message || 'RPC error'));
        else resolve(msg.result);
        return;
      }

      if (msg.method === 'ping' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/resource-teardown' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/notifications/host-context-changed' && msg.params) {
        hostContext = Object.assign({}, hostContext, msg.params);
        applyHostTheme(hostContext);
      }
    });
  }

  function sendRequest(method, params) {
    if (!isIframe) return Promise.reject(new Error('Not in iframe'));
    return new Promise((resolve, reject) => {
      const id = nextId++;
      pending.set(id, {resolve, reject});
      window.parent.postMessage({jsonrpc: '2.0', id, method, params}, '*');
      setTimeout(() => {
        if (pending.has(id)) { pending.delete(id); reject(new Error('Timeout')); }
      }, 30000);
    });
  }

  async function init() {
    if (!isIframe) return null;
    const result = await sendRequest('ui/initialize', {
      protocolVersion: '2026-01-26',
      appInfo: { name: 'Kite Widget', version: '1.0.0' },
      appCapabilities: {},
    });
    hostContext = result.hostContext || null;
    if (hostContext) applyHostTheme(hostContext);
    window.parent.postMessage({jsonrpc: '2.0', method: 'ui/notifications/initialized'}, '*');
    return result;
  }

  async function callServerTool(name, args) {
    const result = await sendRequest('tools/call', { name, arguments: args || {} });
    if (result && result.content && result.content[0] && result.content[0].text) {
      try { return JSON.parse(result.content[0].text); } catch(e) {}
      return result.content[0].text;
    }
    return result;
  }

  function openLink(url) {
    if (!isIframe) { window.open(url, '_blank'); return; }
    sendRequest('ui/open-link', { url }).catch(() => window.open(url, '_blank'));
  }

  function applyHostTheme(ctx) {
    if (!ctx) return;
    if (ctx.theme === 'light') document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
  }

  function notifySize() {
    if (!isIframe) return;
    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/notifications/size-changed',
      params: { width: document.documentElement.scrollWidth, height: document.documentElement.scrollHeight }
    }, '*');
  }

  if (typeof ResizeObserver !== 'undefined') {
    let resizeTimer;
    new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => notifySize(), 100);
    }).observe(document.body);
  }

  async function sendMessage(text) {
    return sendRequest('ui/message', {
      role: 'user',
      content: [{ type: 'text', text }]
    });
  }

  async function updateModelContext(text) {
    return sendRequest('ui/update-model-context', {
      content: [{ type: 'text', text }]
    });
  }

  async function requestDisplayMode(mode) {
    return sendRequest('ui/request-display-mode', { mode });
  }

  async function downloadFile(filename, mimeType, data) {
    return sendRequest('ui/download-file', { filename, mimeType, data: btoa(data) });
  }

  return { init, callServerTool, openLink, notifySize,
    sendMessage, updateModelContext, requestDisplayMode, downloadFile,
    get isIframe() { return isIframe; } };
})();

function formatINR(n) {
  if (n == null || isNaN(n)) return '--';
  const neg = n < 0; const abs = Math.abs(n);
  const [int, dec] = abs.toFixed(2).split('.');
  let r = '';
  if (int.length <= 3) { r = int; }
  else { r = int.slice(-3); let rem = int.slice(0,-3);
    while (rem.length > 2) { r = rem.slice(-2)+','+r; rem = rem.slice(0,-2); }
    if (rem.length) r = rem+','+r;
  }
  return (neg?'-':'')+'₹'+r+'.'+dec;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = String(text);
  return e;
}

function dirBadgeCls(dir) {
  const d = (dir || '').toLowerCase();
  if (d === 'above' || d === 'rise_pct') return 'badge badge-green';
  if (d === 'below' || d === 'drop_pct') return 'badge badge-red';
  return 'badge badge-amber';
}

function distClass(pct) {
  const abs = Math.abs(pct);
  if (abs < 2) return 'dist-near';
  if (abs < 5) return 'dist-mid';
  return 'dist-far';
}

function fmtTime(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2, '0');
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return day + ' ' + mon + ' ' + hh + ':' + mm;
}

function fmtDate(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2, '0');
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return day + ' ' + mon;
}

function clearEl(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function isDataEmpty(d) {
  if (!d || typeof d !== 'object') return true;
  return Object.keys(d).length === 0;
}

function updateFooterTs() {
  const ts = document.getElementById('footerTs');
  if (ts) {
    const now = new Date();
    ts.textContent = 'Last updated: ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  }
}

async function deleteAlert(alertId, symbol, direction, row) {
  try {
    await AppBridge.callServerTool('delete_alert', { alert_id: alertId });
    AppBridge.sendMessage('Deleted ' + symbol + ' ' + direction + ' alert');
    if (row && row.parentNode) row.parentNode.removeChild(row);
  } catch (e) {
    // Show error inline
    if (row) row.style.opacity = '0.5';
  }
}

function render() {
  const data = window.__DATA__;

  if (isDataEmpty(data)) {
    document.getElementById('statsRow').innerHTML = '';
    document.getElementById('activeTable').innerHTML = '<div class="auth-error"><strong>Not authenticated</strong><br>Please log in via your MCP client</div>';
    document.getElementById('triggeredList').innerHTML = '';
    document.getElementById('trigTitle').style.display = 'none';
    AppBridge.notifySize();
    return;
  }

  document.getElementById('trigTitle').style.display = '';
  const active = (data.active || []).slice();
  const triggered = data.triggered || [];
  const activeCount = data.active_count != null ? data.active_count : active.length;
  const triggeredCount = data.triggered_count != null ? data.triggered_count : triggered.length;

  // Sort active by distance ascending
  active.sort(function(a, b) {
    const da = a.distance_pct != null ? a.distance_pct : 9999;
    const db = b.distance_pct != null ? b.distance_pct : 9999;
    return da - db;
  });

  // Find nearest alert
  const nearest = active.find(function(a) { return a.distance_pct != null && a.distance_pct > 0; });

  // Stats row
  const statsRow = document.getElementById('statsRow');
  clearEl(statsRow);

  function makeStat(label, value, cls, sub) {
    const card = el('div', 'stat');
    card.appendChild(el('div', 'stat-label', label));
    const val = el('div', 'stat-value' + (cls ? ' ' + cls : ''), value);
    card.appendChild(val);
    if (sub) card.appendChild(el('div', 'stat-sub', sub));
    return card;
  }

  statsRow.appendChild(makeStat('Active Alerts', activeCount, 'accent'));
  statsRow.appendChild(makeStat('Triggered', triggeredCount, 'amber'));
  statsRow.appendChild(makeStat(
    'Nearest Alert',
    nearest ? nearest.tradingsymbol : '--',
    'green',
    nearest ? nearest.distance_pct.toFixed(1) + '% away' : ''
  ));

  // Active alerts table
  const activeTable = document.getElementById('activeTable');
  clearEl(activeTable);

  if (active.length === 0) {
    activeTable.appendChild(el('div', 'empty-state', 'No active alerts'));
  } else {
    const wrap = el('div', 'table-wrap');
    const tbl = document.createElement('table');
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    ['Symbol', 'Direction', 'Target', 'Current', 'Distance', 'Created', ''].forEach(function(h, i) {
      const th = el('th', i >= 2 && i <= 4 ? 'right' : '', h);
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    active.forEach(function(a) {
      const tr = document.createElement('tr');

      // Symbol
      const tdSym = document.createElement('td');
      tdSym.style.color = 'var(--text-0)';
      tdSym.style.fontWeight = '600';
      tdSym.textContent = a.tradingsymbol || '--';
      const exchSpan = document.createElement('span');
      exchSpan.style.cssText = 'color:var(--text-2);font-size:10px;margin-left:4px';
      exchSpan.textContent = a.exchange || '';
      tdSym.appendChild(exchSpan);
      tr.appendChild(tdSym);

      // Direction badge
      const tdDir = document.createElement('td');
      tdDir.appendChild(el('span', dirBadgeCls(a.direction), a.direction));
      tr.appendChild(tdDir);

      // Target
      const tdTarget = el('td', 'right', formatINR(a.target_price));
      tr.appendChild(tdTarget);

      // Current
      const tdCur = el('td', 'right', a.current_price != null ? formatINR(a.current_price) : '--');
      tr.appendChild(tdCur);

      // Distance
      const tdDist = document.createElement('td');
      tdDist.className = 'right';
      if (a.distance_pct != null) {
        const span = el('span', distClass(a.distance_pct), a.distance_pct.toFixed(1) + '%');
        tdDist.appendChild(span);
      } else {
        tdDist.textContent = '--';
      }
      tr.appendChild(tdDist);

      // Created
      tr.appendChild(el('td', '', fmtDate(a.created_at)));

      // Delete button
      const tdDel = document.createElement('td');
      const delBtn = el('button', 'del-btn', '\u2715');
      delBtn.title = 'Delete alert';
      (function(alertId, symbol, direction, row) {
        delBtn.addEventListener('click', function() {
          deleteAlert(alertId, symbol, direction, row);
        });
      })(a.id, a.tradingsymbol, a.direction, tr);
      tdDel.appendChild(delBtn);
      tr.appendChild(tdDel);

      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    activeTable.appendChild(wrap);
  }

  // Triggered history
  const trigList = document.getElementById('triggeredList');
  clearEl(trigList);

  if (triggered.length === 0) {
    trigList.appendChild(el('div', 'empty-state', 'No triggered alerts yet'));
  } else {
    const sorted = triggered.slice().sort(function(a, b) {
      return new Date(b.triggered_at || 0) - new Date(a.triggered_at || 0);
    });
    const list = el('div', 'trig-list');
    sorted.forEach(function(t) {
      const card = el('div', 'trig-card');

      // Symbol
      const sym = el('span', 'trig-symbol', t.tradingsymbol || '--');
      const exch = el('span', 'trig-exch', t.exchange || '');
      sym.appendChild(exch);
      card.appendChild(sym);

      // Direction badge
      card.appendChild(el('span', dirBadgeCls(t.direction), t.direction));

      // Detail text
      const detail = el('span', 'trig-detail');
      detail.textContent = 'Target ' + formatINR(t.target_price) + ' \u2192 Triggered @ ' + (t.triggered_price != null ? formatINR(t.triggered_price) : '--');
      card.appendChild(detail);

      // Time
      card.appendChild(el('span', 'trig-time', fmtTime(t.triggered_at)));

      list.appendChild(card);
    });
    trigList.appendChild(list);
  }

  updateFooterTs();
  AppBridge.notifySize();
}

AppBridge.init().then(function() { render(); }).catch(function() { render(); });
</script>
</body>
</html>
