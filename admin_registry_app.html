<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>App Registry · Kite MCP</title>
<style>
/*__INJECTED_CSS__*/

/* Widget-specific: admin_registry */
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-1); }
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.sep { width: 1px; height: 16px; background: var(--border); }
.title { font-size: 13px; font-weight: 500; color: var(--text-1); }
.dash-link { font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; opacity: 0.8; }
.dash-link:hover { opacity: 1; }

.content { padding: 16px 20px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-value.red { color: var(--red); }

.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-1); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg-2); position: sticky; top: 0; }
th.right, td.right { text-align: right; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--text-1); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-2); }

.badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-muted { background: transparent; color: var(--text-2); border: 1px solid var(--border); }

.empty-state { text-align: center; padding: 32px 16px; color: var(--text-2); font-size: 13px; }

.footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; margin-top: 12px; border-top: 1px solid var(--border); }
.footer-ts { font-family: var(--mono); font-size: 10px; color: var(--text-2); }
.auth-error { text-align: center; padding: 40px 16px; color: var(--text-2); font-size: 13px; }
.auth-error strong { color: var(--red); }

@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr; }
  .content { padding: 12px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span><span class="sep"></span><span class="title">App Registry</span>
  </div>
  <a href="#" class="dash-link" onclick="AppBridge.openLink('https://kite-mcp-server.fly.dev/admin/ops'); return false;">&#8599; Admin Panel</a>
</div>

<div class="content">
  <div class="stats-row" id="statsRow"></div>
  <div class="section-title">Registrations</div>
  <div id="registryTable"></div>
</div>
<div class="footer" id="footerBar">
  <span class="footer-ts" id="footerTs"></span>
  <span class="footer-ts" style="font-style:italic">Data loaded at page render</span>
</div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>
// AppBridge v1.0 — canonical source: appbridge.js
const AppBridge = (() => {
  const isIframe = window.parent !== window;
  let nextId = 1;
  const pending = new Map();
  let hostContext = null;

  if (isIframe) {
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      let msg;
      try {
        msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      } catch (e) { return; }
      if (!msg || msg.jsonrpc !== '2.0') return;

      if (msg.id != null && pending.has(msg.id)) {
        const {resolve, reject} = pending.get(msg.id);
        pending.delete(msg.id);
        if (msg.error) reject(new Error(msg.error.message || 'RPC error'));
        else resolve(msg.result);
        return;
      }

      if (msg.method === 'ping' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/resource-teardown' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/notifications/host-context-changed' && msg.params) {
        hostContext = Object.assign({}, hostContext, msg.params);
        applyHostTheme(hostContext);
      }
    });
  }

  function sendRequest(method, params) {
    if (!isIframe) return Promise.reject(new Error('Not in iframe'));
    return new Promise((resolve, reject) => {
      const id = nextId++;
      pending.set(id, {resolve, reject});
      window.parent.postMessage({jsonrpc: '2.0', id, method, params}, '*');
      setTimeout(() => {
        if (pending.has(id)) { pending.delete(id); reject(new Error('Timeout')); }
      }, 30000);
    });
  }

  async function init() {
    if (!isIframe) return null;
    const result = await sendRequest('ui/initialize', {
      protocolVersion: '2026-01-26',
      appInfo: { name: 'Kite Widget', version: '1.0.0' },
      appCapabilities: {},
    });
    hostContext = result.hostContext || null;
    if (hostContext) applyHostTheme(hostContext);
    window.parent.postMessage({jsonrpc: '2.0', method: 'ui/notifications/initialized'}, '*');
    return result;
  }

  async function callServerTool(name, args) {
    const result = await sendRequest('tools/call', { name, arguments: args || {} });
    if (result && result.content && result.content[0] && result.content[0].text) {
      try { return JSON.parse(result.content[0].text); } catch(e) {}
      return result.content[0].text;
    }
    return result;
  }

  function openLink(url) {
    if (!isIframe) { window.open(url, '_blank'); return; }
    sendRequest('ui/open-link', { url }).catch(() => window.open(url, '_blank'));
  }

  function applyHostTheme(ctx) {
    if (!ctx) return;
    if (ctx.theme === 'light') document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
  }

  function notifySize() {
    if (!isIframe) return;
    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/notifications/size-changed',
      params: { width: document.documentElement.scrollWidth, height: document.documentElement.scrollHeight }
    }, '*');
  }

  if (typeof ResizeObserver !== 'undefined') {
    let resizeTimer;
    new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => notifySize(), 100);
    }).observe(document.body);
  }

  async function sendMessage(text) {
    return sendRequest('ui/message', {
      role: 'user',
      content: [{ type: 'text', text }]
    });
  }

  async function updateModelContext(text) {
    return sendRequest('ui/update-model-context', {
      content: [{ type: 'text', text }]
    });
  }

  async function requestDisplayMode(mode) {
    return sendRequest('ui/request-display-mode', { mode });
  }

  async function downloadFile(filename, mimeType, data) {
    return sendRequest('ui/download-file', { filename, mimeType, data: btoa(data) });
  }

  return { init, callServerTool, openLink, notifySize,
    sendMessage, updateModelContext, requestDisplayMode, downloadFile,
    get isIframe() { return isIframe; } };

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = String(text);
  return e;
}

function clearEl(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function makeStat(label, value, cls) {
  const card = el('div', 'stat');
  card.setAttribute('role', 'status');
  card.appendChild(el('div', 'stat-label', label));
  card.appendChild(el('div', 'stat-value' + (cls ? ' ' + cls : ''), value));
  return card;
}

function isDataEmpty(d) {
  if (!d || typeof d !== 'object') return true;
  return Object.keys(d).length === 0;
}

function fmtNum(n) {
  if (n == null || isNaN(n)) return '--';
  return Number(n).toLocaleString();
}

function statusBadge(status) {
  const badge = el('span', 'badge', status || 'unknown');
  switch ((status || '').toLowerCase()) {
    case 'active': badge.className = 'badge badge-green'; break;
    case 'disabled': badge.className = 'badge badge-red'; break;
    case 'invalid': badge.className = 'badge badge-amber'; break;
    case 'replaced': badge.className = 'badge badge-muted'; break;
    default: badge.className = 'badge badge-accent'; break;
  }
  return badge;
}

function fmtDate(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '--';
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return yyyy + '-' + mm + '-' + dd + ' ' + hh + ':' + min;
}

function updateFooterTs() {
  const ts = document.getElementById('footerTs');
  if (ts) {
    const now = new Date();
    ts.textContent = 'Last updated: ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  }
}

function render() {
  const data = window.__DATA__;

  if (isDataEmpty(data)) {
    document.getElementById('statsRow').textContent = '';
    const regDiv = document.getElementById('registryTable');
    clearEl(regDiv);
    const errMsg = el('div', 'auth-error');
    const strong = el('strong', '', 'Not authenticated');
    errMsg.appendChild(strong);
    errMsg.appendChild(document.createElement('br'));
    errMsg.appendChild(document.createTextNode('Admin access required'));
    regDiv.appendChild(errMsg);
    AppBridge.notifySize();
    return;
  }

  const regs = data.registrations || [];
  const totalCount = data.total != null ? data.total : regs.length;
  const activeCount = data.active != null ? data.active : regs.filter(function(r) { return r.status === 'active'; }).length;
  const assignedCount = regs.filter(function(r) { return r.assigned_to; }).length;

  // Summary stats
  const statsRow = document.getElementById('statsRow');
  clearEl(statsRow);
  statsRow.appendChild(makeStat('Total Registrations', fmtNum(totalCount), 'accent'));
  statsRow.appendChild(makeStat('Active', fmtNum(activeCount), 'green'));
  statsRow.appendChild(makeStat('Assigned', fmtNum(assignedCount), 'amber'));

  // Registry table
  const registryTable = document.getElementById('registryTable');
  clearEl(registryTable);

  if (regs.length === 0) {
    registryTable.appendChild(el('div', 'empty-state', 'No registrations found'));
  } else {
    const wrap = el('div', 'table-wrap');
    const tbl = document.createElement('table');
    tbl.setAttribute('role', 'table');
    tbl.setAttribute('aria-label', 'App registrations');

    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    ['Label', 'API Key', 'Assigned To', 'Registered By', 'Status', 'Last Used'].forEach(function(h) {
      const th = document.createElement('th');
      th.textContent = h;
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    regs.forEach(function(r) {
      const tr = document.createElement('tr');

      const tdLabel = document.createElement('td');
      tdLabel.style.color = 'var(--text-0)';
      tdLabel.style.fontWeight = '500';
      tdLabel.textContent = r.label || r.id || '--';
      tr.appendChild(tdLabel);

      tr.appendChild(el('td', '', r.api_key || '--'));

      const tdAssigned = document.createElement('td');
      tdAssigned.textContent = r.assigned_to || '--';
      if (!r.assigned_to) tdAssigned.style.color = 'var(--text-2)';
      tr.appendChild(tdAssigned);

      tr.appendChild(el('td', '', r.registered_by || '--'));

      const tdStatus = document.createElement('td');
      tdStatus.appendChild(statusBadge(r.status));
      tr.appendChild(tdStatus);

      tr.appendChild(el('td', '', fmtDate(r.last_used_at)));

      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    registryTable.appendChild(wrap);
  }

  updateFooterTs();
  AppBridge.notifySize();
}

// Boot
(async () => {
  // Show loading state
  const app = document.querySelector('.content') || document.getElementById('app');
  if (app) {
    const loader = document.createElement('div');
    loader.className = 'loading-state';
    loader.textContent = 'Loading...';
    loader.style.cssText = 'text-align:center;padding:40px;color:var(--text-2);font-size:13px;';
    app.appendChild(loader);
  }
  try { await AppBridge.init(); } catch(e) {}
  if (typeof window.__DATA__ === 'string') {
    try { window.__DATA__ = JSON.parse(window.__DATA__); } catch(e) { window.__DATA__ = null; }
  }
  try { render(); } catch(e) {
    const app = document.querySelector('.content') || document.body;
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'padding:40px;text-align:center;color:var(--red,#f87171);font-size:13px;';
    errDiv.textContent = 'Widget error: ' + (e.message || 'Unknown error');
    app.textContent = '';
    app.appendChild(errDiv);
    if (typeof AppBridge !== 'undefined') AppBridge.notifySize();
  }
})();
</script>
</body>
</html>
