{{define "content"}}
<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="none" stroke="var(--success)" stroke-width="2"/>
            <path d="M8 12l2 2 4-4" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <h1>Kite MCP Server</h1>
    <div class="status">
        Service Running
    </div>
    <div class="info">
        Version: <span class="version">{{.Version}}</span>
    </div>
    {{if .OAuthEnabled}}
    <div style="margin-top: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <a href="/auth/browser-login?redirect=/dashboard"
           style="display: inline-block; padding: 10px 24px; background: var(--primary); color: #fff; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 0.875rem;">
            Sign in with Kite
        </a>
        <a href="/auth/admin-login"
           style="font-size: 0.8rem; color: var(--text-muted); text-decoration: underline;">
            Admin Login
        </a>
    </div>
    {{end}}
</div>
{{end}}

{{template "base" .}}
