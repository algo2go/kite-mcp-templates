<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerts · Kite MCP</title>
<link rel="stylesheet" href="/static/dashboard-base.css">
<script src="/static/htmx.min.js"></script>
<style>
.stats-grid { grid-template-columns: repeat(4, 1fr); margin-bottom: 20px; }
.loading-state, .empty-state { padding: 48px 20px; }
.section-header { display: flex; align-items: center; justify-content: space-between; }
.section-header .refresh-hint { font-size: 10px; font-weight: 400; text-transform: none; letter-spacing: normal; color: var(--text-2); }
.badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-1); margin-bottom: 16px; }
td { padding: 9px 12px; }

.dist-green { color: var(--green); font-weight: 600; }
.dist-amber { color: var(--amber); font-weight: 600; }
.dist-red { color: var(--red); font-weight: 600; }
.btn-delete { padding: 2px 10px; border: 1px solid var(--red); border-radius: 3px; background: transparent; color: var(--red); font-size: 11px; cursor: pointer; font-family: var(--mono); transition: background 0.12s; }
.btn-delete:hover { background: var(--red-dim); }

.tl-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; margin-bottom: 8px; }
.tl-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.tl-symbol { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text-0); }
.tl-price { font-family: var(--mono); font-size: 12px; color: var(--text-1); margin-left: auto; }
.tl-stages { display: flex; align-items: center; gap: 0; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; }
.tl-stage { display: flex; align-items: center; gap: 5px; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tl-dot-green { background: var(--green); box-shadow: 0 0 4px var(--green); }
.tl-dot-amber { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.tl-dot-cyan { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
.tl-dot-red { background: var(--red); box-shadow: 0 0 4px var(--red); }
.tl-label { color: var(--text-2); }
.tl-time { color: var(--text-1); }
.tl-delta { color: var(--text-2); font-size: 10px; }
.tl-arrow { color: var(--text-2); margin: 0 6px; }

@media (max-width: 640px) {
  .topbar-email { max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-value { font-size: 18px; }
  .dash-nav-link { padding: 12px 14px; }
  button, .btn-delete { min-height: 44px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Kite MCP</span>
    <span class="topbar-sep"></span>
    <span class="topbar-title">Alerts</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-updated" id="lastUpdated">{{.UpdatedAt}}</span>
    <span class="topbar-email" id="userEmail">{{.Email}}</span>
    <div class="status-dot{{if .TokenValid}} valid{{else}} expired{{end}}" id="tokenDot"></div>
  </div>
</div>

<nav class="dash-nav">
  <a href="/dashboard" class="dash-nav-link">Portfolio</a>
  <a href="/dashboard/activity" class="dash-nav-link">Activity</a>
  <a href="/dashboard/orders" class="dash-nav-link">Orders</a>
  <a href="/dashboard/alerts" class="dash-nav-link active">Alerts</a>
  <a href="/dashboard/paper" class="dash-nav-link">Paper</a>
  <a href="/dashboard/safety" class="dash-nav-link">Safety</a>
</nav>

<div class="content">
  <div id="errorBanner" class="error-state" style="display:none"></div>

  <!-- Summary Cards (server-rendered) -->
  <div class="stats-grid">
    {{template "user_alerts_stats" .Stats}}
  </div>

  <!-- Active Alerts (server-rendered) -->
  <div class="section-header">
    <span>Active Alerts</span>
    <span class="refresh-hint">Auto-refreshes every 30s</span>
  </div>
  <div id="activeSection">
    {{template "user_alerts_active" .Active}}
  </div>

  <!-- Triggered History (server-rendered) -->
  <div class="section-header"><span>Triggered History</span></div>
  <div id="triggeredSection">
    {{template "user_alerts_triggered" .Triggered}}
  </div>
</div>

<script>
(function() {
  'use strict';

  var REFRESH_MS = 30000;
  var refreshTimer = null;

  // --- Delete alert (interactive JS, kept) ---
  function deleteAlert(alertID) {
    if (!confirm('Delete this alert?')) return;
    fetch('/dashboard/api/alerts-enriched?alert_id=' + encodeURIComponent(alertID), { method: 'DELETE' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        location.reload();
      })
      .catch(function(err) {
        var errorBanner = document.getElementById('errorBanner');
        errorBanner.textContent = 'Failed to delete alert: ' + err.message;
        errorBanner.style.display = 'block';
      });
  }

  // Attach delete handlers to server-rendered buttons
  function attachDeleteHandlers() {
    var buttons = document.querySelectorAll('.btn-delete[data-alert-id]');
    for (var i = 0; i < buttons.length; i++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          deleteAlert(btn.getAttribute('data-alert-id'));
        });
      })(buttons[i]);
    }
  }

  // Auto-refresh via fetch + replace (lightweight, no htmx for this page since delete needs re-binding)
  function refreshAlerts() {
    fetch('/dashboard/api/alerts-enriched')
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) return;
        // Update stat cards text
        var statActive = document.querySelector('.stats-grid .stat-card:nth-child(1) .stat-value');
        var statTriggered = document.querySelector('.stats-grid .stat-card:nth-child(2) .stat-value');
        if (statActive) statActive.textContent = data.summary.active_count != null ? data.summary.active_count : '--';
        if (statTriggered) statTriggered.textContent = data.summary.triggered_count != null ? data.summary.triggered_count : '--';
        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour12: false});
      })
      .catch(function() {});
  }

  attachDeleteHandlers();
  refreshTimer = setInterval(refreshAlerts, REFRESH_MS);
})();
</script>
</body>
</html>
