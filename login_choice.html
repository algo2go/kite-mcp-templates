{{define "content"}}
<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="none" stroke="var(--primary)" stroke-width="2"/>
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <h1>Sign In</h1>
    <p style="margin-bottom: 1.5rem; font-size: 0.875rem;">
        Choose how you'd like to sign in to the Kite MCP dashboard.
    </p>
    <div style="display: flex; flex-direction: column; gap: 12px;">
        <a href="/auth/browser-login?redirect={{.Redirect}}"
           style="display: block; padding: 12px 20px; background: var(--primary); color: #fff; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 0.875rem; text-align: center; transition: opacity 0.2s;"
           onmouseover="this.style.opacity='0.9'"
           onmouseout="this.style.opacity='1'">
            Sign in with Kite
        </a>
        {{if .ShowAdminLogin}}
        <a href="/auth/admin-login?redirect={{.Redirect}}"
           style="display: block; padding: 10px 20px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 4px; text-decoration: none; font-weight: 500; font-size: 0.8rem; text-align: center; transition: border-color 0.2s;"
           onmouseover="this.style.borderColor='var(--primary)'"
           onmouseout="this.style.borderColor='var(--border)'">
            Admin Login (password)
        </a>
        {{end}}
        {{if .GoogleSSOEnabled}}
        <a href="/auth/google/login?redirect={{.Redirect}}"
           style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 10px 20px; background: #fff; color: #333; border: 1px solid #dadce0; border-radius: 4px; text-decoration: none; font-weight: 500; font-size: 0.8rem; text-align: center; transition: background 0.2s;"
           onmouseover="this.style.background='#f7f8f8'"
           onmouseout="this.style.background='#fff'">
            <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign in with Google
        </a>
        {{end}}
    </div>
</div>
{{end}}

{{template "base" .}}
