{{define "legal"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} - Kite MCP Server</title>
<style>
:root {
  --bg-0: #0a0c10; --bg-1: #0f1218; --bg-2: #161b24; --bg-3: #1e2430;
  --border: #252d3a; --border-hi: #334155;
  --text-0: #e2e8f0; --text-1: #94a3b8; --text-2: #64748b;
  --accent: #22d3ee; --accent-dim: rgba(34,211,238,0.12);
  --green: #34d399; --amber: #fbbf24; --red: #f87171;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.7; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; background: var(--bg-1);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); }
.topbar-nav { font-size: 13px; color: var(--text-1); }
.topbar-nav a { color: var(--text-1); }
.topbar-nav a:hover { color: var(--accent); }

.container { max-width: 760px; margin: 0 auto; padding: 48px 24px 64px; }

h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: var(--text-0); letter-spacing: -0.02em; }
.meta { font-size: 0.825rem; color: var(--text-2); margin-bottom: 32px; }

h2 { font-size: 1.25rem; font-weight: 600; color: var(--text-0); margin-top: 40px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
h3 { font-size: 1rem; font-weight: 600; color: var(--text-0); margin-top: 24px; margin-bottom: 8px; }
p { margin-bottom: 12px; color: var(--text-1); font-size: 0.9rem; }
ul, ol { margin-bottom: 12px; padding-left: 24px; color: var(--text-1); font-size: 0.9rem; }
li { margin-bottom: 6px; }
strong { color: var(--text-0); font-weight: 600; }

.callout {
  background: var(--bg-2); border: 1px solid var(--amber); border-radius: 8px;
  padding: 16px 20px; margin-bottom: 24px; font-size: 0.85rem; color: var(--amber);
}
.callout strong { color: var(--amber); }

table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.85rem; }
th { text-align: left; padding: 10px 12px; background: var(--bg-2); color: var(--text-0); font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-1); vertical-align: top; }

.footer {
  text-align: center; padding: 24px; font-size: 0.75rem; color: var(--text-2);
  border-top: 1px solid var(--border);
}

@media (max-width: 768px) {
  .container { padding: 32px 16px 48px; }
  h1 { font-size: 1.5rem; }
  table { font-size: 0.8rem; }
  th, td { padding: 8px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/" class="topbar-logo" style="text-decoration:none;">Kite MCP</a>
    <div class="topbar-sep"></div>
    <div class="topbar-nav">{{.Title}}</div>
  </div>
</div>

<div class="container">
{{.Content}}
</div>

<div class="footer">
  <a href="/" style="color: var(--text-2); margin-right: 12px;">Home</a>
  <a href="/terms" style="color: var(--text-2); margin-right: 12px;">Terms of Service</a>
  <a href="/privacy" style="color: var(--text-2);">Privacy Policy</a>
</div>

</body>
</html>
{{end}}
