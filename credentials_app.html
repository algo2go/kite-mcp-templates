<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">

<style>
/*
 * Widget CSS: Self-contained by MCP protocol requirement.
 * Variables mirror dashboard-base.css tokens but MUST be inline
 * because MCP widgets are served as standalone HTML blobs.
 * Canonical token definitions: dashboard-base.css
 */
:root {
  --bg-0: var(--mcp-ui-bg-primary, #0a0c10);
  --bg-1: var(--mcp-ui-bg-secondary, #0f1218);
  --bg-2: var(--mcp-ui-bg-tertiary, #161b24);
  --bg-3: #1e2430;
  --border: var(--mcp-ui-border-color, #252d3a); --border-hi: #334155;
  --text-0: var(--mcp-ui-text-primary, #e2e8f0);
  --text-1: var(--mcp-ui-text-secondary, #94a3b8);
  --text-2: var(--mcp-ui-text-tertiary, #64748b);
  --accent: var(--mcp-ui-accent-color, #22d3ee); --accent-dim: rgba(34,211,238,0.12);
  --green: var(--mcp-ui-success-color, #34d399); --green-dim: rgba(52,211,153,0.12);
  --red: var(--mcp-ui-error-color, #f87171); --red-dim: rgba(248,113,113,0.1);
  --amber: var(--mcp-ui-warning-color, #fbbf24); --amber-dim: rgba(251,191,36,0.1);
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html.light {
  --bg-0: #ffffff; --bg-1: #f8fafc; --bg-2: #f1f5f9; --bg-3: #e2e8f0;
  --border: #e2e8f0; --border-hi: #cbd5e1;
  --text-0: #0f172a; --text-1: #475569; --text-2: #94a3b8;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); line-height: 1.5; -webkit-font-smoothing: antialiased; }

/*__INJECTED_CSS__*/

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-1); }
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.sep { width: 1px; height: 16px; background: var(--border); }
.title { font-size: 13px; font-weight: 500; color: var(--text-1); }

.content { padding: 18px 20px; }

/* Section titles */
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Current credentials card */
.creds-card { background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 18px; }
.creds-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.creds-row:last-child { margin-bottom: 0; }
.creds-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); min-width: 100px; }
.creds-value { font-family: var(--mono); font-size: 13px; color: var(--text-0); font-weight: 500; }
.creds-value.muted { color: var(--text-2); font-style: italic; font-weight: 400; }

/* Warning callout */
.callout { display: flex; gap: 10px; align-items: flex-start; padding: 11px 14px; background: var(--amber-dim); border: 1px solid var(--amber); border-radius: 6px; margin-bottom: 18px; font-size: 12px; color: var(--text-0); line-height: 1.5; }
.callout-icon { flex-shrink: 0; color: var(--amber); font-weight: 700; font-family: var(--mono); font-size: 14px; line-height: 1; padding-top: 2px; }
.callout-body { flex: 1; }
.callout-title { font-weight: 600; color: var(--amber); margin-bottom: 3px; }

/* Form */
.form-card { background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
.form-field { margin-bottom: 14px; }
.form-field:last-of-type { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); margin-bottom: 6px; }
.form-label .req-mark { color: var(--red); margin-left: 2px; }
.form-input { width: 100%; padding: 9px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-0); color: var(--text-0); font-family: var(--mono); font-size: 13px; transition: border-color 0.12s; }
.form-input:focus { outline: none; border-color: var(--accent); background: var(--bg-0); }
.form-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
.form-input:disabled { opacity: 0.5; cursor: not-allowed; }
.form-input[aria-invalid="true"] { border-color: var(--red); }
.form-hint { font-size: 11px; color: var(--text-2); margin-top: 4px; }

/* Buttons */
.form-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn { padding: 8px 18px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); font-size: 12px; font-family: var(--sans); font-weight: 500; cursor: pointer; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn-primary { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); font-weight: 600; }
.btn-primary:hover { background: var(--accent); color: var(--bg-0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn:disabled:hover { border-color: var(--border); color: var(--text-1); background: var(--bg-2); }

/* Spinner */
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Status banners */
.status { margin-top: 14px; padding: 11px 14px; border-radius: 6px; font-size: 12px; display: none; line-height: 1.5; }
.status.show { display: block; }
.status.success { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.status.error { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.status-title { font-weight: 600; margin-bottom: 4px; }
.status-body { color: var(--text-0); }
.status.success .status-body { color: var(--text-0); }
.status.error .status-body { color: var(--text-0); }

/* Inline error next to button */
.inline-error { margin-top: 10px; padding: 8px 10px; border-radius: 4px; font-size: 12px; background: var(--red-dim); color: var(--red); border: 1px solid var(--red); display: none; }
.inline-error.show { display: block; }

/* Auth error */
.auth-error { text-align: center; padding: 40px 16px; color: var(--text-2); font-size: 13px; }
.auth-error strong { color: var(--red); }

/* Mobile: stack content full width */
@media (max-width: 500px) {
  .content { padding: 14px; }
  .creds-row { flex-direction: column; align-items: flex-start; gap: 2px; }
  .creds-label { min-width: 0; }
  .form-card { padding: 14px; }
  .form-actions { flex-direction: column; }
  .btn { width: 100%; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span><span class="sep"></span><span class="title">Rotate Credentials</span>
  </div>
</div>

<div class="content" id="content">
  <!-- populated by render() -->
</div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>
// AppBridge v1.0 — canonical source: appbridge.js
const AppBridge = (() => {
  const isIframe = window.parent !== window;
  let nextId = 1;
  const pending = new Map();
  let hostContext = null;

  if (isIframe) {
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      let msg;
      try {
        msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      } catch (e) { return; }
      if (!msg || msg.jsonrpc !== '2.0') return;

      if (msg.id != null && pending.has(msg.id)) {
        const {resolve, reject} = pending.get(msg.id);
        pending.delete(msg.id);
        if (msg.error) reject(new Error(msg.error.message || 'RPC error'));
        else resolve(msg.result);
        return;
      }

      if (msg.method === 'ping' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/resource-teardown' && msg.id != null) {
        window.parent.postMessage({jsonrpc: '2.0', id: msg.id, result: {}}, '*');
        return;
      }

      if (msg.method === 'ui/notifications/host-context-changed' && msg.params) {
        hostContext = Object.assign({}, hostContext, msg.params);
        applyHostTheme(hostContext);
      }
    });
  }

  function sendRequest(method, params) {
    if (!isIframe) return Promise.reject(new Error('Not in iframe'));
    return new Promise((resolve, reject) => {
      const id = nextId++;
      pending.set(id, {resolve, reject});
      window.parent.postMessage({jsonrpc: '2.0', id, method, params}, '*');
      setTimeout(() => {
        if (pending.has(id)) { pending.delete(id); reject(new Error('Timeout')); }
      }, 30000);
    });
  }

  async function init() {
    if (!isIframe) return null;
    const result = await sendRequest('ui/initialize', {
      protocolVersion: '2026-01-26',
      appInfo: { name: 'Kite Widget', version: '1.0.0' },
      appCapabilities: {},
    });
    hostContext = result.hostContext || null;
    if (hostContext) applyHostTheme(hostContext);
    window.parent.postMessage({jsonrpc: '2.0', method: 'ui/notifications/initialized'}, '*');
    return result;
  }

  async function callServerTool(name, args) {
    const result = await sendRequest('tools/call', { name, arguments: args || {} });
    if (result && result.content && result.content[0] && result.content[0].text) {
      try { return JSON.parse(result.content[0].text); } catch(e) {}
      return result.content[0].text;
    }
    return result;
  }

  function openLink(url) {
    if (!isIframe) { window.open(url, '_blank'); return; }
    sendRequest('ui/open-link', { url }).catch(() => window.open(url, '_blank'));
  }

  function applyHostTheme(ctx) {
    if (!ctx) return;
    if (ctx.theme === 'light') document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
  }

  function notifySize() {
    if (!isIframe) return;
    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/notifications/size-changed',
      params: { width: document.documentElement.scrollWidth, height: document.documentElement.scrollHeight }
    }, '*');
  }

  if (typeof ResizeObserver !== 'undefined') {
    let resizeTimer;
    new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => notifySize(), 100);
    }).observe(document.body);
  }

  async function sendMessage(text) {
    return sendRequest('ui/message', {
      role: 'user',
      content: [{ type: 'text', text }]
    });
  }

  async function updateModelContext(text) {
    return sendRequest('ui/update-model-context', {
      content: [{ type: 'text', text }]
    });
  }

  async function requestDisplayMode(mode) {
    return sendRequest('ui/request-display-mode', { mode });
  }

  async function downloadFile(filename, mimeType, data) {
    return sendRequest('ui/download-file', { filename, mimeType, data: btoa(data) });
  }

  return { init, callServerTool, openLink, notifySize,
    sendMessage, updateModelContext, requestDisplayMode, downloadFile,
    get isIframe() { return isIframe; } };
})();

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = String(text);
  return e;
}

function clearEl(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function isDataEmpty(d) {
  if (!d || typeof d !== 'object') return true;
  return Object.keys(d).length === 0;
}

function renderAuthError(container) {
  clearEl(container);
  const wrap = el('div', 'auth-error');
  wrap.appendChild(el('strong', null, 'Not authenticated'));
  wrap.appendChild(document.createElement('br'));
  wrap.appendChild(document.createTextNode('Please log in via your MCP client'));
  container.appendChild(wrap);
}

function fmtTimestamp(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const day = String(d.getDate()).padStart(2, '0');
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const year = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return day + ' ' + mon + ' ' + year + ' at ' + hh + ':' + mm;
}

async function rotateCredentials(apiKey, apiSecret, submitBtn, cancelBtn, statusEl, inlineErrEl, apiKeyInput, apiSecretInput) {
  // Transition to submitting
  submitBtn.disabled = true;
  submitBtn.setAttribute('aria-busy', 'true');
  cancelBtn.disabled = true;
  apiKeyInput.disabled = true;
  apiSecretInput.disabled = true;
  statusEl.className = 'status';
  inlineErrEl.className = 'inline-error';

  // Swap button text to spinner
  clearEl(submitBtn);
  const spinner = el('span', 'spinner');
  spinner.setAttribute('aria-hidden', 'true');
  submitBtn.appendChild(spinner);
  submitBtn.appendChild(document.createTextNode(' Rotating...'));

  try {
    const result = await AppBridge.callServerTool('update_my_credentials', {
      api_key: apiKey,
      api_secret: apiSecret,
    });

    // Check if result indicates an error (tool returns isError=true for validation failures)
    // callServerTool unwraps the text content; server-side errors typically come back as text
    // in the form "error: ...". We treat a string result that looks like an error message
    // the same as a thrown error.
    if (typeof result === 'string' && /^(error|failed|invalid|not\s|oauth)/i.test(result)) {
      throw new Error(result);
    }

    // Success state
    statusEl.className = 'status show success';
    clearEl(statusEl);
    const title = el('div', 'status-title', '\u2713 Credentials rotated successfully');
    statusEl.appendChild(title);
    const body = el('div', 'status-body');
    body.textContent = 'Your old cached Kite access token has been invalidated. To continue trading, run the login tool to re-authenticate with Kite using the new credentials.';
    statusEl.appendChild(body);

    // Clear inputs for security (don't leave secret in DOM)
    apiKeyInput.value = '';
    apiSecretInput.value = '';

    // Keep button disabled after success — user must reload to rotate again
    submitBtn.removeAttribute('aria-busy');
    clearEl(submitBtn);
    submitBtn.appendChild(document.createTextNode('\u2713 Done'));
    cancelBtn.disabled = false;
    clearEl(cancelBtn);
    cancelBtn.appendChild(document.createTextNode('Close'));
    // Move focus to the close/cancel button so keyboard users can dismiss
    try { cancelBtn.focus(); } catch (e) { /* ignore */ }
  } catch (e) {
    // Error state — re-enable inputs so user can retry
    inlineErrEl.className = 'inline-error show';
    clearEl(inlineErrEl);
    inlineErrEl.appendChild(document.createTextNode('\u2717 ' + (e.message || 'Failed to update credentials')));

    submitBtn.disabled = false;
    submitBtn.removeAttribute('aria-busy');
    cancelBtn.disabled = false;
    apiKeyInput.disabled = false;
    apiSecretInput.disabled = false;
    clearEl(submitBtn);
    submitBtn.appendChild(document.createTextNode('Retry'));
    // Return focus to the API key input so retry is frictionless
    try { apiKeyInput.focus(); } catch (err) { /* ignore */ }
  } finally {
    AppBridge.notifySize();
  }
}

function render() {
  const content = document.getElementById('content');
  const data = window.__DATA__;

  if (isDataEmpty(data)) {
    renderAuthError(content);
    AppBridge.notifySize();
    return;
  }

  clearEl(content);

  const credsRegistered = !!data.credentials_registered;
  const apiKeyMasked = data.api_key_masked || '';
  const lastUpdated = data.last_updated || '';

  // ---- Current credentials section ----
  content.appendChild(el('h2', 'section-title', 'Current Credentials'));
  const credsCard = el('div', 'creds-card');

  const apiKeyRow = el('div', 'creds-row');
  apiKeyRow.appendChild(el('span', 'creds-label', 'API Key'));
  if (credsRegistered && apiKeyMasked) {
    apiKeyRow.appendChild(el('span', 'creds-value', apiKeyMasked));
  } else {
    apiKeyRow.appendChild(el('span', 'creds-value muted', 'Not registered'));
  }
  credsCard.appendChild(apiKeyRow);

  if (credsRegistered) {
    const updatedRow = el('div', 'creds-row');
    updatedRow.appendChild(el('span', 'creds-label', 'Last Updated'));
    if (lastUpdated) {
      updatedRow.appendChild(el('span', 'creds-value', fmtTimestamp(lastUpdated)));
    } else {
      updatedRow.appendChild(el('span', 'creds-value muted', 'Unknown'));
    }
    credsCard.appendChild(updatedRow);
  }

  content.appendChild(credsCard);

  // ---- Warning callout ----
  const callout = el('div', 'callout');
  const calloutIcon = el('div', 'callout-icon', '\u26A0');
  calloutIcon.setAttribute('aria-hidden', 'true');
  callout.appendChild(calloutIcon);
  const calloutBody = el('div', 'callout-body');
  calloutBody.appendChild(el('div', 'callout-title', 'Rotation will sign you out'));
  const calloutText = document.createElement('div');
  calloutText.textContent = 'Rotating credentials invalidates all cached Kite tokens. You will be logged out and must re-authenticate using the login tool.';
  calloutBody.appendChild(calloutText);
  callout.appendChild(calloutBody);
  content.appendChild(callout);

  // ---- New credentials form ----
  content.appendChild(el('h2', 'section-title', 'New Credentials'));
  const formCard = document.createElement('form');
  formCard.className = 'form-card';
  formCard.setAttribute('novalidate', 'novalidate');
  formCard.setAttribute('aria-label', 'Rotate Kite API credentials');

  // API Key field
  const apiKeyField = el('div', 'form-field');
  const apiKeyLabel = document.createElement('label');
  apiKeyLabel.className = 'form-label';
  apiKeyLabel.setAttribute('for', 'api-key-input');
  apiKeyLabel.appendChild(document.createTextNode('API Key'));
  const apiKeyReq = el('span', 'req-mark', '*');
  apiKeyReq.setAttribute('aria-hidden', 'true');
  apiKeyLabel.appendChild(apiKeyReq);
  apiKeyField.appendChild(apiKeyLabel);
  const apiKeyInput = document.createElement('input');
  apiKeyInput.id = 'api-key-input';
  apiKeyInput.className = 'form-input';
  apiKeyInput.type = 'text';
  apiKeyInput.autocomplete = 'off';
  apiKeyInput.spellcheck = false;
  apiKeyInput.required = true;
  apiKeyInput.setAttribute('aria-required', 'true');
  apiKeyInput.setAttribute('aria-describedby', 'rotate-form-err');
  apiKeyInput.placeholder = 'Your Kite developer app API key';
  apiKeyField.appendChild(apiKeyInput);
  formCard.appendChild(apiKeyField);

  // API Secret field (input-only, never displayed back)
  const apiSecretField = el('div', 'form-field');
  const apiSecretLabel = document.createElement('label');
  apiSecretLabel.className = 'form-label';
  apiSecretLabel.setAttribute('for', 'api-secret-input');
  apiSecretLabel.appendChild(document.createTextNode('API Secret'));
  const apiSecretReq = el('span', 'req-mark', '*');
  apiSecretReq.setAttribute('aria-hidden', 'true');
  apiSecretLabel.appendChild(apiSecretReq);
  apiSecretField.appendChild(apiSecretLabel);
  const apiSecretInput = document.createElement('input');
  apiSecretInput.id = 'api-secret-input';
  apiSecretInput.className = 'form-input';
  apiSecretInput.type = 'password';
  apiSecretInput.autocomplete = 'new-password';
  apiSecretInput.spellcheck = false;
  apiSecretInput.required = true;
  apiSecretInput.setAttribute('aria-required', 'true');
  apiSecretInput.setAttribute('aria-describedby', 'api-secret-hint rotate-form-err');
  apiSecretInput.placeholder = 'Your Kite developer app API secret';
  apiSecretField.appendChild(apiSecretInput);
  const secretHint = el('div', 'form-hint', 'The secret is sent directly to the server and is not displayed anywhere in this widget.');
  secretHint.id = 'api-secret-hint';
  apiSecretField.appendChild(secretHint);
  formCard.appendChild(apiSecretField);

  // Actions
  const actions = el('div', 'form-actions');
  const submitBtn = el('button', 'btn btn-primary', 'Rotate');
  submitBtn.type = 'submit';
  const cancelBtn = el('button', 'btn', 'Cancel');
  cancelBtn.type = 'button';
  actions.appendChild(submitBtn);
  actions.appendChild(cancelBtn);
  formCard.appendChild(actions);

  // Inline error slot — role=alert so it's announced immediately
  const inlineErr = el('div', 'inline-error');
  inlineErr.id = 'rotate-form-err';
  inlineErr.setAttribute('role', 'alert');
  inlineErr.setAttribute('aria-live', 'assertive');
  formCard.appendChild(inlineErr);

  // Success/error banner slot — role=status (polite) for post-submit announcements
  const statusEl = el('div', 'status');
  statusEl.setAttribute('role', 'status');
  statusEl.setAttribute('aria-live', 'polite');
  formCard.appendChild(statusEl);

  content.appendChild(formCard);

  // Wire up handlers
  function clearInvalid() {
    apiKeyInput.removeAttribute('aria-invalid');
    apiSecretInput.removeAttribute('aria-invalid');
  }

  function onCancel() {
    apiKeyInput.value = '';
    apiSecretInput.value = '';
    inlineErr.className = 'inline-error';
    statusEl.className = 'status';
    clearInvalid();
    apiKeyInput.focus();
    AppBridge.notifySize();
  }

  function onSubmit(e) {
    if (e && typeof e.preventDefault === 'function') e.preventDefault();
    const apiKey = apiKeyInput.value.trim();
    const apiSecret = apiSecretInput.value;
    inlineErr.className = 'inline-error';
    statusEl.className = 'status';
    clearInvalid();

    if (!apiKey) {
      inlineErr.className = 'inline-error show';
      clearEl(inlineErr);
      inlineErr.appendChild(document.createTextNode('\u2717 API key is required'));
      apiKeyInput.setAttribute('aria-invalid', 'true');
      apiKeyInput.focus();
      AppBridge.notifySize();
      return;
    }
    if (!apiSecret) {
      inlineErr.className = 'inline-error show';
      clearEl(inlineErr);
      inlineErr.appendChild(document.createTextNode('\u2717 API secret is required'));
      apiSecretInput.setAttribute('aria-invalid', 'true');
      apiSecretInput.focus();
      AppBridge.notifySize();
      return;
    }

    rotateCredentials(apiKey, apiSecret, submitBtn, cancelBtn, statusEl, inlineErr, apiKeyInput, apiSecretInput);
  }

  // Form submit handler (covers Enter-to-submit + click-to-submit natively)
  formCard.addEventListener('submit', onSubmit);
  cancelBtn.addEventListener('click', onCancel);

  // Escape in any input clears / cancels the form
  function onInputKeydown(e) {
    if (e.key === 'Escape') {
      e.preventDefault();
      onCancel();
    }
  }
  apiKeyInput.addEventListener('keydown', onInputKeydown);
  apiSecretInput.addEventListener('keydown', onInputKeydown);

  AppBridge.notifySize();
}

document.addEventListener('keydown', function(e) {
  // Reload shortcut (only when no form input is focused)
  const tag = document.activeElement ? document.activeElement.tagName : '';
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && tag !== 'INPUT' && tag !== 'TEXTAREA') {
    location.reload();
  }
});

AppBridge.init().then(function() {
