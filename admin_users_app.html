<!DOCTYPE html>

.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-1); }
.header-left { display: flex; align-items: center; gap: 8px; }

.stat { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-1); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); border-bottom: 1px solid var(--border); background: var(--bg-2); position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--text-1); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-2); }
.badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-muted { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
.action-btn { padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; cursor: pointer; border: none; font-family: var(--mono); }
.action-btn.suspend { background: var(--red-dim); color: var(--red); }
.action-btn.activate { background: var(--green-dim); color: var(--green); }
.action-btn:hover { opacity: 0.8; }
.empty-state { text-align: center; padding: 32px 16px; color: var(--text-2); font-size: 13px; }
.auth-error { text-align: center; padding: 40px 16px; color: var(--text-2); font-size: 13px; }
.auth-error strong { color: var(--red); }
.footer { padding: 10px 20px; margin-top: 12px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-2); }
@media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .content { padding: 12px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">Kite MCP</span><span class="sep"></span><span class="title">Admin Users</span>
  </div>
</div>
<div class="content">
  <div class="stats-row" id="statsRow"></div>
  <div class="section-title">Users</div>
  <div id="usersTable"></div>
</div>
<div class="footer"><span id="footerTs"></span></div>

<script>window.__DATA__ = "__INJECTED_DATA__";</script>
<script>

  async function init() {

function el(tag, cls, text) { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = String(text); return e; }

function makeStat(label, value, cls) { const c = el('div','stat'); c.setAttribute('role','status'); c.appendChild(el('div','stat-label',label)); c.appendChild(el('div','stat-value'+(cls?' '+cls:''),value)); return c; }

function roleBadge(role) {
  const b = el('span', 'badge', role);
  if (role === 'admin') b.className = 'badge badge-accent';
  else if (role === 'trader') b.className = 'badge badge-green';
  else b.className = 'badge badge-muted';
  return b;
}
function statusBadge(status) {
  const b = el('span', 'badge', status);
  if (status === 'active') b.className = 'badge badge-green';
  else if (status === 'suspended') b.className = 'badge badge-red';
  else b.className = 'badge badge-muted';
  return b;
}
function fmtDate(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '--';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function render() {
  const data = window.__DATA__;
  if (!data || typeof data !== 'object' || Object.keys(data).length === 0) {
    const ut = document.getElementById('usersTable');
    clearEl(ut);
    const err = el('div', 'auth-error');
    err.appendChild(el('strong', '', 'Not authenticated'));
    err.appendChild(document.createElement('br'));
    err.appendChild(document.createTextNode('Admin access required'));
    ut.appendChild(err);
    AppBridge.notifySize();
    return;
  }

  const users = data.users || [];
  const total = data.total || users.length;
  const active = users.filter(function(u) { return u.status === 'active'; }).length;
  const suspended = users.filter(function(u) { return u.status === 'suspended'; }).length;
  const admins = users.filter(function(u) { return u.role === 'admin'; }).length;

  const sr = document.getElementById('statsRow');
  clearEl(sr);
  sr.appendChild(makeStat('Total', String(total), 'accent'));
  sr.appendChild(makeStat('Active', String(active), 'green'));
  sr.appendChild(makeStat('Suspended', String(suspended), 'red'));
  sr.appendChild(makeStat('Admins', String(admins), 'amber'));

  const ut = document.getElementById('usersTable');
  clearEl(ut);

  if (users.length === 0) {
    ut.appendChild(el('div', 'empty-state', 'No users found'));
  } else {
    const wrap = el('div', 'table-wrap');
    const tbl = document.createElement('table');
    tbl.setAttribute('role', 'table');
    tbl.setAttribute('aria-label', 'User list');
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    ['Email', 'Role', 'Status', 'Last Login', 'Actions'].forEach(function(h) {
      hr.appendChild(el('th', '', h));
    });
    thead.appendChild(hr);
    tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    users.forEach(function(u) {
      const tr = document.createElement('tr');
      const tdEmail = el('td', '', u.email);
      tdEmail.style.color = 'var(--text-0)';
      tdEmail.style.fontWeight = '500';
      tr.appendChild(tdEmail);

      const tdRole = document.createElement('td');
      tdRole.appendChild(roleBadge(u.role));
      tr.appendChild(tdRole);

      const tdStatus = document.createElement('td');
      tdStatus.appendChild(statusBadge(u.status));
      tr.appendChild(tdStatus);

      tr.appendChild(el('td', '', fmtDate(u.last_login)));

      const tdActions = document.createElement('td');
      if (u.status === 'active') {
        const btn = el('button', 'action-btn suspend', 'Suspend');
        btn.setAttribute('aria-label', 'Suspend ' + u.email);
        btn.addEventListener('click', function() {
          AppBridge.callServerTool('admin_suspend_user', { target_email: u.email, confirm: true, reason: 'Admin action' })
            .then(function() { location.reload(); })
            .catch(function(e) { alert('Error: ' + e.message); });
        });
        tdActions.appendChild(btn);
      } else if (u.status === 'suspended') {
        const btn = el('button', 'action-btn activate', 'Activate');
        btn.setAttribute('aria-label', 'Activate ' + u.email);
        btn.addEventListener('click', function() {
          AppBridge.callServerTool('admin_activate_user', { target_email: u.email })
            .then(function() { location.reload(); })
            .catch(function(e) { alert('Error: ' + e.message); });
        });
        tdActions.appendChild(btn);
      }
      tr.appendChild(tdActions);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    ut.appendChild(wrap);
  }

  const now = new Date();
  document.getElementById('footerTs').textContent = 'Updated: ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

(async () => {

    const loader = document.createElement('div');
    loader.className = 'loading-state';
    loader.textContent = 'Loading...';
    loader.style.cssText = 'text-align:center;padding:40px;color:var(--text-2);font-size:13px;';
    app.appendChild(loader);
  }
  try { await AppBridge.init(); } catch(e) {}
  if (typeof window.__DATA__ === 'string') { try { window.__DATA__ = JSON.parse(window.__DATA__); } catch(e) { window.__DATA__ = null; } }
  try { render(); } catch(e) {
    const app = document.querySelector('.content') || document.body;
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'padding:40px;text-align:center;color:var(--red,#f87171);font-size:13px;';
    errDiv.textContent = 'Widget error: ' + (e.message || 'Unknown error');
    app.textContent = '';
    app.appendChild(errDiv);
    if (typeof AppBridge !== 'undefined') AppBridge.notifySize();
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      // Close any open dropdowns or modals
      document.querySelectorAll('.dropdown-open').forEach(function(el) {
        el.classList.remove('dropdown-open');
      });
    }
    if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
      // Refresh data
      location.reload();
    }
  });
})();
</script>
</body>
