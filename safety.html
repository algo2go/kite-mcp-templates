<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety · Kite MCP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg-0: #0a0c10; --bg-1: #0f1218; --bg-2: #161b24; --bg-3: #1e2430;
  --border: #252d3a; --border-hi: #334155;
  --text-0: #e2e8f0; --text-1: #94a3b8; --text-2: #64748b;
  --accent: #22d3ee; --accent-dim: rgba(34,211,238,0.12);
  --green: #34d399; --green-dim: rgba(52,211,153,0.12);
  --red: #f87171; --red-dim: rgba(248,113,113,0.1);
  --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.1);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-0); color: var(--text-0); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: var(--bg-1); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); }
.topbar-title { font-size: 14px; font-weight: 500; color: var(--text-1); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-updated { font-family: var(--mono); font-size: 11px; color: var(--text-2); }

.dash-nav { display: flex; gap: 0; padding: 0 24px; background: var(--bg-1); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
.dash-nav-link { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text-2); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: var(--sans); }
.dash-nav-link:hover { color: var(--text-1); }
.dash-nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

.content { padding: 20px 24px; max-width: 1000px; }

/* Freeze banner */
.freeze-banner { border-radius: 6px; padding: 16px 20px; margin-bottom: 20px; border: 1px solid; }
.freeze-banner.active { background: var(--green-dim); border-color: rgba(52,211,153,0.3); }
.freeze-banner.frozen { background: var(--red-dim); border-color: rgba(248,113,113,0.3); }
.freeze-banner.disabled { background: var(--bg-2); border-color: var(--border); }
.freeze-icon { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
.freeze-icon.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
.freeze-icon.frozen { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.freeze-title { font-size: 15px; font-weight: 600; }
.freeze-title.active { color: var(--green); }
.freeze-title.frozen { color: var(--red); }
.freeze-detail { font-size: 12px; font-family: var(--mono); color: var(--text-1); margin-top: 6px; }

.section-header { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Limit bars */
.limit-grid { display: flex; flex-direction: column; gap: 14px; }
.limit-item { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
.limit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.limit-name { font-size: 13px; font-weight: 500; color: var(--text-0); }
.limit-value { font-family: var(--mono); font-size: 12px; color: var(--text-1); }
.limit-bar-bg { height: 6px; background: var(--bg-0); border-radius: 3px; overflow: hidden; }
.limit-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.limit-bar-fill.safe { background: var(--green); }
.limit-bar-fill.warn { background: var(--amber); }
.limit-bar-fill.danger { background: var(--red); }

/* SEBI cards */
.sebi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.sebi-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.sebi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sebi-dot.ok { background: var(--green); }
.sebi-dot.warn { background: var(--amber); }
.sebi-dot.off { background: var(--red); }
.sebi-label { font-size: 12px; font-weight: 500; color: var(--text-1); }

.loading-state { text-align: center; padding: 40px; color: var(--text-2); font-size: 13px; font-family: var(--mono); }

@media (max-width: 640px) {
  .content { padding: 14px 12px; }
  .topbar { padding: 0 12px; }
  .dash-nav-link { padding: 12px 14px; }
  .sebi-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Kite MCP</span>
    <span class="topbar-sep"></span>
    <span class="topbar-title">Safety</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-updated" id="lastUpdated">--</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--text-2)" id="userEmail">--</span>
    <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0" id="tokenDot"></div>
  </div>
</div>

<nav class="dash-nav">
  <a href="/dashboard" class="dash-nav-link">Portfolio</a>
  <a href="/dashboard/activity" class="dash-nav-link">Activity</a>
  <a href="/dashboard/orders" class="dash-nav-link">Orders</a>
  <a href="/dashboard/alerts" class="dash-nav-link">Alerts</a>
  <a href="/dashboard/paper" class="dash-nav-link">Paper</a>
  <a href="/dashboard/safety" class="dash-nav-link active">Safety</a>
  <a href="/admin/ops" class="dash-nav-link">Ops</a>
</nav>

<div class="content">
  <div id="freezeBanner" class="freeze-banner disabled">
    <div class="loading-state">Loading RiskGuard status...</div>
  </div>

  <div class="section-header">Limit Utilization</div>
  <div class="limit-grid" id="limitGrid">
    <div class="loading-state">Loading limits...</div>
  </div>

  <div class="section-header">SEBI Compliance</div>
  <div class="sebi-grid" id="sebiGrid">
    <div class="loading-state">Loading compliance status...</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = String(text);
    return e;
  }
  function clearChildren(node) { while (node.firstChild) node.removeChild(node.firstChild); }

  function fmtINR(val) {
    if (val >= 100000) return '\u20B9' + (val / 100000).toFixed(1) + 'L';
    if (val >= 1000) return '\u20B9' + (val / 1000).toFixed(1) + 'K';
    return '\u20B9' + val.toFixed(0);
  }

  function fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:false });
  }

  function barClass(pct) {
    if (pct >= 90) return 'danger';
    if (pct >= 70) return 'warn';
    return 'safe';
  }

  function renderFreezeBanner(data) {
    var banner = document.getElementById('freezeBanner');
    clearChildren(banner);

    if (!data.enabled) {
      banner.className = 'freeze-banner disabled';
      var msg = el('div', null, null);
      var icon = el('span', 'freeze-icon', null);
      icon.style.background = 'var(--text-2)';
      msg.appendChild(icon);
      msg.appendChild(el('span', 'freeze-title', ' RiskGuard Disabled'));
      banner.appendChild(msg);
      banner.appendChild(el('div', 'freeze-detail', data.message || 'Not enabled on this server.'));
      return;
    }

    var status = data.status;
    if (status.is_frozen) {
      banner.className = 'freeze-banner frozen';
      var title = el('div', null, null);
      var icon = el('span', 'freeze-icon frozen', null);
      title.appendChild(icon);
      title.appendChild(el('span', 'freeze-title frozen', 'TRADING FROZEN'));
      banner.appendChild(title);

      var detail = 'Reason: ' + (status.frozen_reason || 'Unknown');
      if (status.frozen_by) detail += ' | By: ' + status.frozen_by;
      if (status.frozen_at && status.frozen_at !== '0001-01-01T00:00:00Z') {
        detail += ' | At: ' + fmtTime(status.frozen_at);
      }
      banner.appendChild(el('div', 'freeze-detail', detail));
    } else {
      banner.className = 'freeze-banner active';
      var title = el('div', null, null);
      var icon = el('span', 'freeze-icon active', null);
      title.appendChild(icon);
      title.appendChild(el('span', 'freeze-title active', 'Trading Active'));
      banner.appendChild(title);
      banner.appendChild(el('div', 'freeze-detail', 'All safety checks operational. No restrictions in effect.'));
    }
  }

  function renderLimits(data) {
    var grid = document.getElementById('limitGrid');
    clearChildren(grid);

    if (!data.enabled) {
      grid.appendChild(el('div', 'loading-state', 'RiskGuard is not enabled.'));
      return;
    }

    var status = data.status;
    var limits = data.limits;

    var items = [
      {
        name: 'Daily Orders',
        current: status.daily_order_count,
        max: limits.max_orders_per_day,
        fmt: function(v) { return v; }
      },
      {
        name: 'Daily Value',
        current: status.daily_placed_value,
        max: limits.max_daily_value_inr,
        fmt: fmtINR
      },
      {
        name: 'Single Order Cap',
        current: 0,
        max: limits.max_single_order_inr,
        fmt: fmtINR,
        static: true
      },
      {
        name: 'Rate Limit',
        current: 0,
        max: limits.max_orders_per_minute,
        fmt: function(v) { return v + '/min'; },
        static: true
      },
      {
        name: 'Duplicate Window',
        current: 0,
        max: limits.duplicate_window_secs,
        fmt: function(v) { return v + 's'; },
        static: true
      }
    ];

    items.forEach(function(item) {
      var card = el('div', 'limit-item');

      var header = el('div', 'limit-header');
      header.appendChild(el('span', 'limit-name', item.name));
      if (item.static) {
        header.appendChild(el('span', 'limit-value', 'Limit: ' + item.fmt(item.max)));
      } else {
        header.appendChild(el('span', 'limit-value', item.fmt(item.current) + ' / ' + item.fmt(item.max)));
      }
      card.appendChild(header);

      if (!item.static) {
        var pct = item.max > 0 ? Math.min(100, (item.current / item.max) * 100) : 0;
        var barBg = el('div', 'limit-bar-bg');
        var barFill = el('div', 'limit-bar-fill ' + barClass(pct));
        barFill.style.width = pct + '%';
        barBg.appendChild(barFill);
        card.appendChild(barBg);
      }

      grid.appendChild(card);
    });
  }

  function renderSEBI(data) {
    var grid = document.getElementById('sebiGrid');
    clearChildren(grid);

    if (!data.enabled) {
      grid.appendChild(el('div', 'loading-state', 'RiskGuard is not enabled.'));
      return;
    }

    var sebi = data.sebi;
    var checks = [
      { label: 'Static Egress IP', ok: sebi.static_egress_ip },
      { label: 'Session Active', ok: sebi.session_active },
      { label: 'Credentials Set', ok: sebi.credentials_set },
      { label: 'Order Tagging', ok: sebi.order_tagging },
      { label: 'Audit Trail', ok: sebi.audit_trail }
    ];

    checks.forEach(function(check) {
      var card = el('div', 'sebi-card');
      card.appendChild(el('span', 'sebi-dot ' + (check.ok ? 'ok' : 'off')));
      card.appendChild(el('span', 'sebi-label', check.label));
      grid.appendChild(card);
    });
  }

  function refresh() {
    fetch('/dashboard/api/safety/status')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        renderFreezeBanner(data);
        renderLimits(data);
        renderSEBI(data);
        document.getElementById('lastUpdated').textContent =
          'Updated ' + new Date().toLocaleTimeString('en-GB', { hour12: false });
      })
      .catch(function(err) {
        console.error('safety fetch error:', err);
      });
  }

  // --- Status / auth gating ---
  function refreshStatus() {
    fetch('/dashboard/api/status').then(function(r) { return r.json(); }).then(function(d) {
      document.getElementById('userEmail').textContent = d.email || '--';
      var dot = document.getElementById('tokenDot');
      var valid = d.kite_token && d.kite_token.valid;
      dot.style.background = valid ? 'var(--green)' : 'var(--red)';
      dot.style.boxShadow = valid ? '0 0 6px var(--green)' : '0 0 6px var(--red)';
      if (!d.is_admin) {
        var opsLink = document.querySelector('a.dash-nav-link[href="/admin/ops"]');
        if (opsLink) opsLink.style.display = 'none';
      }
    }).catch(function() {});
  }

  refreshStatus();
  refresh();
  setInterval(refreshStatus, 10000);
  setInterval(refresh, 10000);
})();
</script>
</body>
</html>
