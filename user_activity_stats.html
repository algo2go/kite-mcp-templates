{{define "user_activity_stats"}}
{{range .Cards}}
<div class="stat-card">
  <div class="stat-label">{{.Label}}</div>
  <div class="stat-value{{if .Class}} {{.Class}}{{end}}"{{if .ID}} id="{{.ID}}"{{end}}>{{.Value}}</div>
  {{if or .Sub .ID}}<div class="stat-sub"{{if .ID}} id="{{.ID}}Sub"{{end}}>{{.Sub}}</div>{{end}}
</div>
{{end}}
{{end}}
