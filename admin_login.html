{{define "content"}}
<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="var(--primary)" />
            <path
                d="M12 7a3 3 0 0 0-3 3v2H8v5h8v-5h-1v-2a3 3 0 0 0-3-3zm-1 3a1 1 0 1 1 2 0v2h-2v-2z"
                fill="#fff"
            />
        </svg>
    </div>
    <h1>Admin Login</h1>
    <p style="margin-bottom: 1.5rem;">
        Sign in with your admin email and password.
    </p>
    {{if .Error}}
    <div style="background: #fff3e0; border: 1px solid #ff9800; border-radius: 4px; padding: 0.75rem; margin-bottom: 1rem; font-size: 0.875rem; color: #e65100;">
        {{.Error}}
    </div>
    {{end}}
    <form method="POST" action="/auth/admin-login" style="text-align: left;">
        <input type="hidden" name="redirect" value="{{.Redirect}}" />
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
        <label for="email" style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--heading); margin-bottom: 0.5rem;">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@example.com"
            required
            style="width: 100%; padding: 0.625rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.875rem; outline: none; transition: border-color 0.2s; margin-bottom: 1rem;"
            onfocus="this.style.borderColor='var(--primary)'"
            onblur="this.style.borderColor='var(--border)'"
        />
        <label for="password" style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--heading); margin-bottom: 0.5rem;">Password</label>
        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            style="width: 100%; padding: 0.625rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.875rem; outline: none; transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--primary)'"
            onblur="this.style.borderColor='var(--border)'"
        />
        <button
            type="submit"
            style="width: 100%; margin-top: 1rem; padding: 0.625rem; background: var(--primary); color: #fff; border: none; border-radius: 4px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s;"
            onmouseover="this.style.opacity='0.9'"
            onmouseout="this.style.opacity='1'"
        >
            Sign In
        </button>
    </form>
    {{if .GoogleSSOEnabled}}
    <div style="margin-top: 1rem; text-align: center;">
        <div style="margin: 1rem 0; border-top: 1px solid var(--border); position: relative;">
            <span style="position: absolute; top: -0.6rem; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 0.5rem; font-size: 0.75rem; color: var(--text-muted);">or</span>
        </div>
        <a href="/auth/google/login?redirect={{.Redirect}}"
           style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.625rem; background: #fff; color: #333; border: 1px solid #dadce0; border-radius: 4px; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.2s;"
           onmouseover="this.style.background='#f7f8f8'"
           onmouseout="this.style.background='#fff'">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign in with Google
        </a>
    </div>
    {{end}}
    <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
        Not admin? <a href="/auth/browser-login" style="color: var(--primary); text-decoration: none;">Log in with Kite</a>
    </p>
</div>
{{end}}

{{template "base" .}}
